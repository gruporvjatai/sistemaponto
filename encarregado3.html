<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Encarregado - RV Sistemas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="RV Ponto">
    <meta name="apple-mobile-web-app-title" content="RV Ponto">
    <meta name="theme-color" content="#0f172a"> 
    <link rel="manifest" href="manifest.json">
    
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-lg bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
    
    <!-- Cabeçalho -->
    <div class="px-5 pt-5 pb-2 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i data-lucide="shield-check" class="w-6 h-6 text-blue-600"></i>
            <h2 class="font-bold text-slate-800 text-lg">Painel de Diárias</h2>
        </div>
        <div class="flex items-center gap-1">
            <button id="btn-trocar-obra" onclick="voltarSelecaoObra()" class="hidden p-2 text-slate-400 hover:text-slate-600"><i data-lucide="map-pin" class="w-5 h-5"></i></button>
            <button onclick="sair()" class="p-2 text-slate-400 hover:text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- Seleção de Obra -->
    <div id="selecao-obra" class="p-5">
        <i data-lucide="building" class="w-10 h-10 mx-auto text-slate-300 mb-2"></i>
        <select id="select-obra" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-medium text-slate-700 mb-3"></select>
        <button onclick="acessarObra()" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold flex items-center justify-center gap-2">
            <i data-lucide="arrow-right-circle" class="w-5 h-5"></i> Acessar
        </button>
        <button onclick="definirLocalObra()" class="mt-3 text-xs text-slate-400 flex items-center justify-center gap-1 mx-auto">
            <i data-lucide="map-pin" class="w-3 h-3"></i> Definir GPS da Obra
        </button>
    </div>

    <!-- Painel Principal -->
    <div id="painel-supervisor" class="hidden p-5">
        <div class="bg-indigo-50 p-3 rounded-xl mb-5 text-center">
            <h3 id="nome-obra-titulo" class="font-black text-indigo-800 truncate"></h3>
        </div>

        <!-- Pendentes -->
        <div class="mb-5">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-bold text-slate-600 flex items-center gap-1"><i data-lucide="clock" class="w-4 h-4"></i> Pendentes</span>
                <button onclick="carregarPendentes()" class="text-blue-600 text-xs font-bold"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
            </div>
            <div id="lista-pendentes" class="space-y-2 max-h-64 overflow-y-auto pr-1"></div>
            <button onclick="abrirModalConfirmados()" class="w-full mt-2 p-2 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold flex items-center justify-center gap-1">
                <i data-lucide="check-circle" class="w-4 h-4"></i> Confirmados hoje
            </button>
        </div>

        <!-- Ações rápidas (2 botões lado a lado) -->
        <div class="grid grid-cols-2 gap-3 mb-5">
            <button onclick="abrirModalManual()" class="bg-white border border-slate-200 rounded-xl p-3 shadow-sm active:bg-slate-50">
                <i data-lucide="edit" class="w-6 h-6 text-blue-600 mx-auto mb-1"></i>
                <span class="block text-sm font-bold text-slate-700">Ponto</span>
            </button>
            <button onclick="abrirModalMetragem()" class="bg-white border border-slate-200 rounded-xl p-3 shadow-sm active:bg-slate-50">
                <i data-lucide="ruler" class="w-6 h-6 text-amber-600 mx-auto mb-1"></i>
                <span class="block text-sm font-bold text-slate-700">Metragem</span>
            </button>
        </div>

        
        <!-- Relatórios (2 botões) -->
        <div class="grid grid-cols-2 gap-3">
            <button id="btn-whatsapp" onclick="compartilharRelatorioWhatsApp()" class="bg-green-600 text-white p-3 rounded-xl font-bold text-sm flex items-center justify-center gap-1">
                <i data-lucide="message-circle" class="w-4 h-4"></i>WhatsApp
            </button>
            <button id="btn-share-externo" onclick="compartilharRelatorioExterno()" class="bg-indigo-600 text-white p-3 rounded-xl font-bold text-sm flex items-center justify-center gap-1">
                <i data-lucide="share-2" class="w-4 h-4"></i> Compartilhar
            </button>
        </div>
    </div>
</div>

<!-- Modais (mantidos exatamente iguais) -->
<div id="modal-manual" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-5 rounded-2xl w-full max-w-sm">
        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="clock" class="text-blue-600"></i> Ponto Manual</h3>
        <div class="space-y-3">
            <select id="manual-funcionario" class="w-full p-3 border rounded-xl bg-slate-50"></select>
            <input type="time" id="manual-hora" class="w-full p-3 border rounded-xl text-center font-bold">
            <select id="manual-tipo" class="w-full p-3 border rounded-xl"><option value="ENTRADA">Entrada</option></select>
            <button onclick="salvarPontoManual(event)" class="w-full p-3 bg-emerald-600 text-white rounded-xl font-bold">Salvar</button>
            <button onclick="fecharModalManual()" class="w-full p-3 bg-slate-200 rounded-xl font-bold">Cancelar</button>
        </div>
    </div>
</div>

<div id="modal-confirmados" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-5 rounded-2xl w-full max-w-md max-h-[80vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg">Confirmados Hoje</h3>
            <button onclick="fecharModalConfirmados()"><i data-lucide="x"></i></button>
        </div>
        <div id="modal-confirmados-conteudo"></div>
    </div>
</div>

<div id="modal-metragem" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-5 rounded-2xl w-full max-w-sm">
        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="ruler" class="text-amber-600"></i> Metragem</h3>
        <div class="space-y-3">
            <select id="metragem-terceirizado" class="w-full p-3 border rounded-xl bg-slate-50"></select>
            <input type="date" id="metragem-data" class="w-full p-3 border rounded-xl">
            <input type="number" step="0.01" id="metragem-metros" placeholder="Metros" class="w-full p-3 border rounded-xl">
            <button onclick="salvarMetragem(event)" class="w-full p-3 bg-amber-600 text-white rounded-xl font-bold">Salvar</button>
            <button onclick="fecharModalMetragem()" class="w-full p-3 bg-slate-200 rounded-xl font-bold">Cancelar</button>
        </div>
    </div>
</div>

<script>
    // ========== SCRIPT MANTIDO INTEGRALMENTE ==========
    lucide.createIcons();
    const SUPABASE_URL = 'https://lyieiqhkspbowsrlngvn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let obraAtualId = null;
    let equipeGlobal = [];
    let terceirizadosGlobal = [];

    window.onload = () => { carregarObras(); };

    function sair() { localStorage.removeItem('obra_atual_id'); window.location.href = 'index.html'; }

    async function carregarObras() {
        const { data } = await supabaseClient.from('jsp_obras').select('id, nome').order('nome');
        const sel = document.getElementById('select-obra');
        sel.innerHTML = '<option value="">-- Selecione --</option>';
        if(data) data.forEach(o => sel.innerHTML += `<option value="${o.id}">${o.nome}</option>`);
    }

    async function acessarObra() {
        const sel = document.getElementById('select-obra');
        if(!sel.value) return alert("Selecione a obra!");
        obraAtualId = sel.value;
        localStorage.setItem('obra_atual_id', obraAtualId);
        document.getElementById('nome-obra-titulo').innerText = sel.options[sel.selectedIndex].text;
        document.getElementById('selecao-obra').classList.add('hidden');
        document.getElementById('painel-supervisor').classList.remove('hidden');
        document.getElementById('btn-trocar-obra').classList.remove('hidden');
        await carregarEquipePorObra();
        await carregarTerceirizadosPorObra();
        carregarPendentes();
    }

    async function carregarEquipePorObra() {
        const selectManual = document.getElementById('manual-funcionario');
        selectManual.innerHTML = '<option value="">Carregando...</option>';
        const { data, error } = await supabaseClient.from('jsp_equipe').select('id, nome, matricula').eq('obra_atual_id', obraAtualId).eq('ativo', true).order('nome');
        if (error) { selectManual.innerHTML = '<option value="">Erro</option>'; equipeGlobal = []; return; }
        selectManual.innerHTML = '';
        if (data && data.length) {
            equipeGlobal = data;
            data.forEach(f => selectManual.innerHTML += `<option value="${f.id}">${f.nome} (#${f.matricula})</option>`);
        } else { selectManual.innerHTML = '<option value="">Nenhum ativo</option>'; equipeGlobal = []; }
    }

    async function carregarTerceirizadosPorObra() {
        const selectTerc = document.getElementById('metragem-terceirizado');
        selectTerc.innerHTML = '<option value="">Carregando...</option>';
        const { data, error } = await supabaseClient.from('jsp_terceirizados').select('id, nome').eq('obra_atual_id', obraAtualId).eq('ativo', true).order('nome');
        if (error) { selectTerc.innerHTML = '<option value="">Erro</option>'; terceirizadosGlobal = []; return; }
        selectTerc.innerHTML = '';
        if (data && data.length) {
            terceirizadosGlobal = data;
            data.forEach(t => selectTerc.innerHTML += `<option value="${t.id}">${t.nome}</option>`);
        } else { selectTerc.innerHTML = '<option value="">Nenhum ativo</option>'; terceirizadosGlobal = []; }
    }

    async function carregarPendentes() {
        const container = document.getElementById('lista-pendentes');
        container.innerHTML = '<p class="text-center text-sm p-2">Buscando...</p>';
        const { data, error } = await supabaseClient.from('jsp_ponto_diario').select('*').eq('obra_id', obraAtualId).eq('status', 'PENDENTE').order('hora_registro', { ascending: false });
        if (error) return container.innerHTML = '<p class="text-red-500 p-2">Erro</p>';
        if (!data || !data.length) return container.innerHTML = '<p class="text-slate-400 p-4 text-center bg-white rounded-lg border">Nenhum pendente</p>';
        container.innerHTML = '';
        data.forEach(p => {
            const func = equipeGlobal.find(e => e.id == p.funcionario_id);
            const nome = func ? `${func.nome.split(' ')[0]} (#${func.matricula})` : 'Desconhecido';
            let hora = p.hora_registro?.includes('T') ? p.hora_registro.split('T')[1].substring(0,5) : p.hora_registro?.split(' ')[1]?.substring(0,5) || '00:00';
            container.innerHTML += `
                <div class="bg-white p-3 rounded-lg border">
                    <p class="font-bold text-sm mb-2">${nome}</p>
                    <div class="flex gap-2 mb-2">
                        <input type="time" id="hora-edit-${p.id}" value="${hora}" class="flex-1 p-1.5 border rounded text-sm">
                        <select id="tipo-edit-${p.id}" class="flex-1 p-1.5 border rounded text-sm"><option>ENTRADA</option></select>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="validar(event, '${p.id}', '${p.hora_registro}', '${p.funcionario_id}')" class="flex-1 py-1.5 bg-emerald-100 text-emerald-800 rounded text-sm font-bold">Confirmar</button>
                        <button onclick="recusar('${p.id}')" class="px-3 bg-red-100 text-red-600 rounded text-sm font-bold">✕</button>
                    </div>
                </div>`;
        });
        lucide.createIcons();
    }

    async function abrirModalConfirmados() {
        document.getElementById('modal-confirmados').classList.remove('hidden');
        const container = document.getElementById('modal-confirmados-conteudo');
        container.innerHTML = '<p class="text-center p-4">Carregando...</p>';
        const hoje = new Date().toISOString().split('T')[0];
        const { data, error } = await supabaseClient.from('jsp_ponto_diario').select('*').eq('obra_id', obraAtualId).eq('status', 'VALIDADO').gte('hora_registro', hoje).order('hora_registro');
        if (error) return container.innerHTML = '<p class="text-red-500">Erro</p>';
        if (!data || !data.length) return container.innerHTML = '<p class="text-slate-400 p-4 text-center">Nenhum confirmado hoje</p>';
        const porFunc = {};
        data.forEach(r => { if(!porFunc[r.funcionario_id]) porFunc[r.funcionario_id] = []; porFunc[r.funcionario_id].push(r); });
        container.innerHTML = '';
        for (const fid in porFunc) {
            const func = equipeGlobal.find(e => e.id == fid) || { nome: '?', matricula: '?' };
            let html = `<div class="bg-slate-50 p-3 rounded-lg mb-2"><p class="font-bold">${func.nome.split(' ')[0]} (#${func.matricula})</p><div class="text-xs space-y-1">`;
            porFunc[fid].forEach(p => { 
                let h = p.hora_registro.split('T')[1]?.substring(0,5) || '--:--';
                html += `<div>${p.tipo==='ENTRADA'?'📥':'📤'} ${h}</div>`; 
            });
            html += '</div></div>';
            container.innerHTML += html;
        }
    }

    function fecharModalConfirmados() { document.getElementById('modal-confirmados').classList.add('hidden'); }

    async function validar(event, pontoId, horaOriginal, funcId) {
        const btn = event.currentTarget; btn.disabled = true; btn.innerHTML = '...';
        try {
            const tipo = document.getElementById(`tipo-edit-${pontoId}`).value;
            const horaEdit = document.getElementById(`hora-edit-${pontoId}`).value;
            let data = horaOriginal?.split('T')[0] || new Date().toISOString().split('T')[0];
            if (tipo === 'ENTRADA') {
                const dup = await verificarDuplicidadePeriodo(funcId, data, horaEdit);
                if(dup) { alert("Já existe entrada nesse período!"); btn.disabled = false; btn.innerHTML = 'Confirmar'; return; }
            }
            const horaCravada = `${data} ${horaEdit}:00`;
            await supabaseClient.from('jsp_ponto_diario').update({ status: 'VALIDADO', tipo, hora_registro: horaCravada }).eq('id', pontoId);
            if (tipo === 'ENTRADA') {
                const h = parseInt(horaEdit.split(':')[0]);
                const saida = h < 12 ? "11:00:00" : "17:00:00";
                await supabaseClient.from('jsp_ponto_diario').insert([{ funcionario_id: funcId, obra_id: obraAtualId, tipo: 'SAIDA', status: 'VALIDADO', hora_registro: `${data} ${saida}`, lat_registro: 'AUTO', lng_registro: 'AUTO' }]);
            }
            carregarPendentes();
        } catch(e) { alert("Erro: "+e.message); } 
        finally { btn.disabled = false; btn.innerHTML = 'Confirmar'; }
    }

    async function recusar(id) { if(confirm("Excluir?")) { await supabaseClient.from('jsp_ponto_diario').delete().eq('id', id); carregarPendentes(); } }

    function abrirModalManual() { 
        document.getElementById('modal-manual').classList.remove('hidden'); 
        const d = new Date(); document.getElementById('manual-hora').value = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; 
    }
    function fecharModalManual() { document.getElementById('modal-manual').classList.add('hidden'); }

    async function salvarPontoManual(event) {
        const btn = event.currentTarget; btn.disabled = true; btn.innerHTML = 'Salvando...';
        try {
            const fId = document.getElementById('manual-funcionario').value;
            const hora = document.getElementById('manual-hora').value;
            const tipo = document.getElementById('manual-tipo').value;
            if(!fId || !hora) throw new Error("Preencha todos.");
            const hoje = new Date(); const data = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
            const dup = await verificarDuplicidadePeriodo(fId, data, hora);
            if(dup) { alert("Já existe entrada nesse período!"); btn.disabled = false; btn.innerHTML = 'Salvar'; return; }
            await supabaseClient.from('jsp_ponto_diario').insert([{ funcionario_id: fId, obra_id: obraAtualId, tipo, status: 'VALIDADO', hora_registro: `${data} ${hora}:00`, lat_registro: 'MANUAL', lng_registro: 'MANUAL' }]);
            if (tipo === 'ENTRADA') {
                const h = parseInt(hora.split(':')[0]); const saida = h < 12 ? "11:00:00" : "17:00:00";
                await supabaseClient.from('jsp_ponto_diario').insert([{ funcionario_id: fId, obra_id: obraAtualId, tipo: 'SAIDA', status: 'VALIDADO', hora_registro: `${data} ${saida}`, lat_registro: 'MANUAL_AUTO', lng_registro: 'MANUAL_AUTO' }]);
            }
            fecharModalManual(); carregarPendentes(); alert("Ponto salvo!");
        } catch(e) { alert("Erro: "+e.message); } 
        finally { btn.disabled = false; btn.innerHTML = 'Salvar'; }
    }

    function abrirModalMetragem() {
        if(!obraAtualId) return alert("Selecione a obra!");
        document.getElementById('modal-metragem').classList.remove('hidden');
        document.getElementById('metragem-data').value = new Date().toISOString().split('T')[0];
        document.getElementById('metragem-metros').value = '';
        carregarTerceirizadosPorObra();
    }
    function fecharModalMetragem() { document.getElementById('modal-metragem').classList.add('hidden'); }

    async function salvarMetragem(event) {
        const btn = event.currentTarget; btn.disabled = true; btn.innerHTML = 'Salvando...';
        try {
            const terc = document.getElementById('metragem-terceirizado').value;
            const data = document.getElementById('metragem-data').value;
            const metros = parseFloat(document.getElementById('metragem-metros').value);
            if(!terc || !data || isNaN(metros) || metros<=0) throw new Error("Preencha corretamente.");
            await supabaseClient.from('jsp_producao_terc').insert([{ id: crypto.randomUUID(), terceirizado_id: terc, obra_id: obraAtualId, data_registro: data, metros, status: 'PENDENTE' }]);
            fecharModalMetragem(); alert("Metragem salva!");
        } catch(e) { alert("Erro: "+e.message); } 
        finally { btn.disabled = false; btn.innerHTML = 'Salvar'; }
    }

    async function gerarTextoRelatorio() {
        if (!equipeGlobal.length) await carregarEquipePorObra();
        const hoje = new Date(); const dataBusca = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
        const { data } = await supabaseClient.from('jsp_ponto_diario').select('*').eq('obra_id', obraAtualId).order('hora_registro');
        const registrosHoje = (data||[]).filter(p => p.hora_registro?.startsWith(dataBusca));
        const porFunc = {}; registrosHoje.forEach(p => { if(!porFunc[p.funcionario_id]) porFunc[p.funcionario_id]=[]; porFunc[p.funcionario_id].push(p); });
        const preps = ['de','da','do','das','dos','e'];
        let msg = `📋 *RELATÓRIO DE PONTO*\n📍 ${document.getElementById('nome-obra-titulo').innerText}\n📅 ${dataBusca.split('-').reverse().join('/')}\n\n✅ *PRESENTES:*\n`;
        const faltantes = [];
        equipeGlobal.forEach(f => {
            const pts = porFunc[f.id] || [];
            if(pts.length) {
                let nome = f.nome; const parts = nome.split(' ');
                if(parts.length>=3) nome = preps.includes(parts[1].toLowerCase()) ? parts.slice(0,3).join(' ') : parts.slice(0,2).join(' ');
                else if(parts.length===2) nome = parts.join(' ');
                msg += `\n👷 *${nome}* (#${f.matricula})\n`;
                pts.filter(p=>p.tipo==='ENTRADA').forEach(p => { let h = p.hora_registro.split('T')[1]?.substring(0,5) || '--:--'; msg += `   ✅ 📥 ${h}\n`; });
            } else { faltantes.push(f); }
        });
        if(faltantes.length) { msg += `\n❌ *FALTAS:*\n`; faltantes.forEach(f => { let nome = f.nome.split(' ').slice(0,2).join(' '); msg += `   • ${nome} (#${f.matricula})\n`; }); }
        else msg += `\n🎉 *TODOS BATERAM PONTO!*\n`;
        msg += `\n_RV Sistemas_`;
        return msg;
    }

    async function compartilharRelatorioWhatsApp() {
    const btn = document.getElementById('btn-whatsapp');
    if (!btn) return;
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>';
    lucide.createIcons();
    try {
        const msg = await gerarTextoRelatorio();
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
    } catch (e) {
        alert("Erro: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
        lucide.createIcons();
    }
}

async function compartilharRelatorioExterno() {
    const btn = document.getElementById('btn-share-externo');
    if (!btn) return;
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>';
    lucide.createIcons();
    try {
        const msg = await gerarTextoRelatorio();
        if (navigator.share) {
            await navigator.share({ title: 'Relatório de Ponto', text: msg });
        } else {
            await navigator.clipboard.writeText(msg);
            alert('📋 Relatório copiado!');
        }
    } catch (e) {
        if (e.name !== 'AbortError') alert("Erro: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
        lucide.createIcons();
    }
}

    function voltarSelecaoObra() {
        document.getElementById('painel-supervisor').classList.add('hidden');
        document.getElementById('btn-trocar-obra').classList.add('hidden');
        document.getElementById('selecao-obra').classList.remove('hidden');
        localStorage.removeItem('obra_atual_id');
    }

    async function definirLocalObra() {
        const sel = document.getElementById('select-obra'); if(!sel.value) return alert("Selecione a obra!");
        const senha = prompt("Senha Admin:"); if(senha !== "rvadmin") return alert("Senha incorreta!");
        if(!confirm("Definir localização atual como sede da obra?")) return;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { error } = await supabaseClient.from('jsp_obras').update({ lat: pos.coords.latitude.toString(), lng: pos.coords.longitude.toString() }).eq('id', sel.value);
            if(error) alert("Erro ao salvar."); else alert("Localização atualizada!");
        }, () => alert("GPS falhou."), { enableHighAccuracy: true });
    }

    async function verificarDuplicidadePeriodo(funcId, dataIso, horaStr) {
        const h = parseInt(horaStr.split(':')[0]); let ini, fim;
        if (h >= 4 && h < 12) { ini = "04:00:00"; fim = "11:59:59"; } else { ini = "12:00:00"; fim = "19:00:00"; }
        const { data } = await supabaseClient.from('jsp_ponto_diario').select('id').eq('funcionario_id', funcId).eq('obra_id', obraAtualId).in('tipo', ['ENTRADA','AJUSTE_MANUAL']).gte('hora_registro', `${dataIso} ${ini}`).lte('hora_registro', `${dataIso} ${fim}`);
        return data && data.length > 0;
    }
</script>
