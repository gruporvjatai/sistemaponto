<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Encarregado - RV Sistemas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="RV Sistema de Ponto">
    <meta name="apple-mobile-web-app-title" content="RV Sistema de Ponto">
    <meta name="theme-color" content="#0f172a"> 
    <link rel="manifest" href="manifest.json">
    
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-xl bg-white p-6 rounded-xl shadow-2xl transition-all">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <div class="flex items-center gap-2">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="shield-check" class="text-blue-600"></i> Painel
                </h2>
                <button id="btn-trocar-obra" onclick="voltarSelecaoObra()" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-500 p-2 rounded-lg transition border border-slate-200" title="Trocar Obra">
                    <i data-lucide="map-pin" class="w-4 h-4"></i>
                </button>
            </div>
            <img src="https://i.postimg.cc/PqdgXGF0/logo-rv-negociospng.png" alt="RV" class="h-8">
        </div>

        <div id="login-supervisor" class="max-w-xs mx-auto text-center py-8">
            <i data-lucide="lock" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
            <p class="text-sm font-bold text-slate-600 mb-2">Digite a senha para acessar:</p>
            <input type="password" id="senha-supervisor" placeholder="Senha" inputmode="numeric" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '')" onkeyup="if(event.key === 'Enter') loginSupervisor()" class="w-full p-3 border-2 rounded-lg mb-3 text-center font-bold outline-none focus:border-blue-500">
            <button onclick="loginSupervisor()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700">Entrar</button>
        </div>

        <div id="selecao-obra" class="hidden text-center py-4">
            <p class="text-sm font-bold text-slate-600 mb-2 uppercase">Escolha a Obra:</p>
            <select id="select-obra" class="w-full p-4 border-2 rounded-lg mb-4 text-center font-bold outline-none bg-slate-50 text-lg"></select>
            <button onclick="acessarObra()" class="w-full bg-indigo-600 text-white p-4 rounded-lg font-bold shadow-lg flex items-center justify-center gap-2">
                <i data-lucide="arrow-right-circle"></i> Gerenciar Obra
            </button>
            
            <button onclick="definirLocalObra()" class="mt-6 text-[11px] font-bold text-slate-400 hover:text-slate-600 uppercase underline transition flex items-center justify-center gap-1 mx-auto">
                <i data-lucide="map-pin" class="w-3 h-3"></i> Definir Localização Atual como Sede da Obra
            </button>
        </div>

        <div id="painel-supervisor" class="hidden">
            <div class="bg-indigo-50 border border-indigo-200 p-4 rounded-xl mb-6 text-center">
                <h3 id="nome-obra-titulo" class="font-black text-indigo-800 text-lg mb-2">OBRA...</h3>
                
                <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200">
                    <p class="text-xs font-bold text-slate-500 uppercase mb-2">QR Code de Hoje para os Funcionários</p>
                    
                    <div id="area-qr-code" class="hidden flex-col items-center justify-center py-4">
                        <img id="img-qr-code" src="" alt="QR Code Ponto" class="w-48 h-48 border-4 border-white shadow-md rounded-lg">
                        <p class="text-[10px] text-slate-400 mt-2">Aponte a câmera para bater o ponto</p>
                    </div>

                    <button id="btn-gerar-qr" onclick="gerarQrCodeDoDia()" class="w-full mt-2 p-3 bg-blue-600 text-white rounded-lg text-sm font-bold flex items-center justify-center gap-2 hover:bg-blue-700 transition">
                        <i data-lucide="qr-code" class="w-5 h-5"></i> Gerar QR Code de Ponto
                    </button>
                </div>
            </div>

            <div class="bg-slate-100 p-4 rounded-lg mb-4 flex justify-between items-center">
                <p class="text-xs font-bold text-slate-500 uppercase">Registros Pendentes</p>
                <button onclick="carregarPendentes()" class="text-blue-600 hover:text-blue-800 flex items-center gap-1 text-sm font-bold"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Atualizar</button>
            </div>

            <div id="lista-pendentes" class="space-y-3 mb-6">
                </div>
            
            <button onclick="abrirModalManual()" class="p-3 bg-slate-800 text-white rounded-lg text-sm font-bold flex items-center justify-center gap-2 hover:bg-slate-900 w-full transition shadow-lg">
                <i data-lucide="edit" class="w-4 h-4"></i> Lançar Ponto Manual (Sem Celular)
            </button>

            <button id="btn-whatsapp" onclick="compartilharRelatorioWhatsApp()" class="mt-3 p-3 bg-green-600 text-white rounded-lg text-sm font-bold flex items-center justify-center gap-2 hover:bg-green-700 w-full transition shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
                </svg>
                Compartilhar Relatório do Dia
            </button>

    <!-- ============================================================================================================================-->

    <div id="modal-manual" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm">
            <h3 class="font-bold text-lg mb-4 text-slate-800 flex items-center gap-2"><i data-lucide="clock" class="text-blue-600"></i> Ponto Manual</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Funcionário</label>
                    <select id="manual-funcionario" class="w-full p-3 border rounded-lg outline-none bg-slate-50 font-bold text-slate-700"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Hora Exata</label>
                    <input type="time" id="manual-hora" class="w-full p-3 border rounded-lg outline-none font-bold text-slate-700 text-center">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Tipo de Movimento</label>
                    <select id="manual-tipo" class="w-full p-3 border rounded-lg outline-none font-bold text-slate-700">
                        <option value="ENTRADA">Entrada</option>
                        <option value="SAIDA">Saída</option>
                    </select>
                </div>
                <div class="pt-2">
                    <button onclick="salvarPontoManual()" class="w-full p-3 bg-emerald-600 text-white rounded-lg font-bold hover:bg-emerald-700 mb-2">Salvar Definitivo</button>
                    <button onclick="fecharModalManual()" class="w-full p-3 bg-slate-200 text-slate-700 rounded-lg font-bold">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const SUPABASE_URL = 'https://lyieiqhkspbowsrlngvn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let obraAtualId = null;
        let equipeGlobal = [];

        function loginSupervisor() {
            if(document.getElementById('senha-supervisor').value === '15748') {
                document.getElementById('login-supervisor').classList.add('hidden');
                document.getElementById('selecao-obra').classList.remove('hidden');
                carregarObras();
            } else { alert("Senha Incorreta!"); }
        }

        async function carregarObras() {
            const { data } = await supabaseClient.from('jsp_obras').select('id, nome').order('nome');
            const sel = document.getElementById('select-obra');
            sel.innerHTML = '<option value="">-- Selecione --</option>';
            if(data) data.forEach(o => sel.innerHTML += `<option value="${o.id}">${o.nome}</option>`);
        }

        async function acessarObra() {
            const sel = document.getElementById('select-obra');
            if(!sel.value) return alert("Selecione a obra!");
            obraAtualId = sel.value;
            document.getElementById('nome-obra-titulo').innerText = sel.options[sel.selectedIndex].text;
            document.getElementById('selecao-obra').classList.add('hidden');
            document.getElementById('painel-supervisor').classList.remove('hidden');
            document.getElementById('btn-trocar-obra').classList.remove('hidden');
            await carregarEquipe();
            carregarPendentes();
        }

        async function carregarEquipe() {
            const { data } = await supabaseClient.from('jsp_equipe').select('id, nome, matricula').order('nome');
            const selectManual = document.getElementById('manual-funcionario');
            selectManual.innerHTML = '';
            if (data) {
                equipeGlobal = data;
                data.forEach(f => selectManual.innerHTML += `<option value="${f.id}">${f.nome} (ID: ${f.matricula})</option>`);
            }
        }

        async function gerarQrCodeDoDia() {
            const btn = document.getElementById('btn-gerar-qr');
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Gerando...';
            const token = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            const dataHojeStr = `${ano}-${mes}-${dia}`;

            const { error } = await supabaseClient.from('jsp_obras').update({ token_diario: token, data_token: dataHojeStr }).eq('id', obraAtualId);
            if(error) return alert("Erro: " + error.message);

            const urlObj = new URL(window.location.href);
            const baseUrl = urlObj.origin + urlObj.pathname.substring(0, urlObj.pathname.lastIndexOf('/') + 1);
            const linkPonto = `${baseUrl}ponto.html?obra_id=${obraAtualId}&token=${token}`;
            
            document.getElementById('img-qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(linkPonto)}`;
            document.getElementById('area-qr-code').classList.remove('hidden');
            document.getElementById('area-qr-code').classList.add('flex');
            btn.innerHTML = '<i data-lucide="refresh-cw" class="w-5 h-5"></i> Gerar Novo Código';
            lucide.createIcons();
        }

        async function carregarPendentes() {
            const container = document.getElementById('lista-pendentes');
            container.innerHTML = '<p class="text-center p-4 text-sm font-bold text-blue-600 animate-pulse">Buscando...</p>';
            
            const { data, error } = await supabaseClient.from('jsp_ponto_diario')
                .select('*').eq('obra_id', obraAtualId).eq('status', 'PENDENTE').order('hora_registro', { ascending: false });
            
            if (error) return container.innerHTML = `<p class="text-center text-red-500 font-bold p-4">Erro ao carregar</p>`;
            if (!data || data.length === 0) return container.innerHTML = '<p class="text-center text-slate-400 font-bold p-6 border rounded-lg bg-white">Nenhum registro pendente.</p>';
            
            container.innerHTML = '';
            
            data.forEach(p => {
                const func = equipeGlobal.find(e => e.id == p.funcionario_id);
                const nomeDisplay = func ? `${func.nome.split(' ')[0]} (#${func.matricula})` : `Desconhecido`;
                
                // MÁGICA 1: Pega a hora exata direto do texto que veio do banco, ignorando o fuso do navegador!
                let horaF = "00:00";
                if (p.hora_registro) {
                    if (p.hora_registro.includes('T')) {
                        horaF = p.hora_registro.split('T')[1].substring(0, 5);
                    } else if (p.hora_registro.includes(' ')) {
                        horaF = p.hora_registro.split(' ')[1].substring(0, 5);
                    }
                }

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <p class="font-black text-blue-800 text-sm uppercase mb-3 flex items-center gap-2">
                            <i data-lucide="user" class="w-4 h-4 text-blue-500"></i> ${nomeDisplay}
                        </p>
                        
                        <div class="flex gap-2 mb-3">
                            <div class="flex-1">
                                <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Horário</label>
                                <input type="time" id="hora-edit-${p.id}" value="${horaF}" class="w-full p-2 border rounded-lg bg-slate-50 font-black text-center text-slate-700 focus:border-blue-500 outline-none">
                            </div>
                            <div class="flex-[1.5]">
                                <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Tipo</label>
                                <select id="tipo-edit-${p.id}" class="w-full p-2 border rounded-lg bg-slate-50 font-bold text-slate-700 focus:border-blue-500 outline-none">
                                    <option value="ENTRADA">Entrada da Obra</option>
                                    <option value="SAIDA">Saída da Obra</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex gap-2 mt-2 pt-3 border-t border-slate-100">
                            <button onclick="validar('${p.id}', '${p.hora_registro}', '${p.funcionario_id}')" class="flex-1 py-2 bg-emerald-100 hover:bg-emerald-600 text-emerald-800 hover:text-white rounded-lg font-bold flex justify-center items-center gap-2 transition">
                                <i data-lucide="check-circle" class="w-5 h-5"></i> Confirmar
                            </button>
                            <button onclick="recusar('${p.id}')" class="px-4 bg-red-50 hover:bg-red-500 text-red-500 hover:text-white rounded-lg font-bold transition flex justify-center items-center">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        async function validar(pontoId, horaOriginal, funcionarioId) {
            const tipo = document.getElementById(`tipo-edit-${pontoId}`).value;
            const horaEditada = document.getElementById(`hora-edit-${pontoId}`).value;
            
            // MÁGICA 2: Corta a data do texto e cola com a hora exata da tela
            let dataApenas = "";
            if (horaOriginal.includes('T')) dataApenas = horaOriginal.split('T')[0];
            else if (horaOriginal.includes(' ')) dataApenas = horaOriginal.split(' ')[0];
            else dataApenas = new Date().toISOString().split('T')[0];
            
            // Usamos espaço em vez de 'T' para o banco aceitar como texto local cravado
            const horaLocalCravada = `${dataApenas} ${horaEditada}:00`;

            await supabaseClient.from('jsp_ponto_diario').update({ 
                status: 'VALIDADO', 
                tipo: tipo, 
                hora_registro: horaLocalCravada 
            }).eq('id', pontoId);

            if (tipo === 'ENTRADA') {
                const h = parseInt(horaEditada.split(':')[0]);
                const horaSaidaAutomatica = h < 12 ? "11:00:00" : "17:00:00";
                const horaSaidaCravada = `${dataApenas} ${horaSaidaAutomatica}`;

                await supabaseClient.from('jsp_ponto_diario').insert([{
                    funcionario_id: funcionarioId,
                    obra_id: obraAtualId,
                    tipo: 'SAIDA',
                    status: 'VALIDADO',
                    hora_registro: horaSaidaCravada,
                    lat_registro: 'SISTEMA_AUTO',
                    lng_registro: 'SISTEMA_AUTO'
                }]);
            }
            
            carregarPendentes();
        }

        async function recusar(pontoId) {
            if(confirm("Apagar registro permanentemente?")) {
                await supabaseClient.from('jsp_ponto_diario').delete().eq('id', pontoId);
                carregarPendentes();
            }
        }

        function abrirModalManual() { 
            document.getElementById('modal-manual').classList.remove('hidden'); 
            
            const hojeLocal = new Date();
            const h = String(hojeLocal.getHours()).padStart(2, '0');
            const m = String(hojeLocal.getMinutes()).padStart(2, '0');
            document.getElementById('manual-hora').value = `${h}:${m}`; 
        }
        function fecharModalManual() { document.getElementById('modal-manual').classList.add('hidden'); }
        
        async function salvarPontoManual() {
            const fId = document.getElementById('manual-funcionario').value;
            const hora = document.getElementById('manual-hora').value;
            const tipo = document.getElementById('manual-tipo').value;
            if(!fId || !hora) return;
            
            const hojeLocal = new Date();
            const ano = hojeLocal.getFullYear();
            const mes = String(hojeLocal.getMonth() + 1).padStart(2, '0');
            const dia = String(hojeLocal.getDate()).padStart(2, '0');
            const dataApenas = `${ano}-${mes}-${dia}`;
            
            const horaLocalCravada = `${dataApenas} ${hora}:00`;

            await supabaseClient.from('jsp_ponto_diario').insert([{ 
                funcionario_id: fId, 
                obra_id: obraAtualId, 
                tipo: tipo, 
                status: 'VALIDADO', 
                hora_registro: horaLocalCravada, 
                lat_registro: 'MANUAL', 
                lng_registro: 'MANUAL' 
            }]);

            if (tipo === 'ENTRADA') {
                const h = parseInt(hora.split(':')[0]);
                const horaSaidaAutomatica = h < 12 ? "11:00:00" : "17:00:00";
                const horaSaidaCravada = `${dataApenas} ${horaSaidaAutomatica}`;

                await supabaseClient.from('jsp_ponto_diario').insert([{
                    funcionario_id: fId,
                    obra_id: obraAtualId,
                    tipo: 'SAIDA',
                    status: 'VALIDADO',
                    hora_registro: horaSaidaCravada,
                    lat_registro: 'MANUAL_AUTO',
                    lng_registro: 'MANUAL_AUTO'
                }]);
            }
            
            fecharModalManual(); 
            carregarPendentes();
        }

        async function compartilharRelatorioWhatsApp() {
            const btn = document.getElementById('btn-whatsapp');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Gerando Relatório...';
            lucide.createIcons();

            const { data, error } = await supabaseClient.from('jsp_ponto_diario')
                .select('*')
                .eq('obra_id', obraAtualId)
                .order('hora_registro', { ascending: true });

            if (error) {
                alert("Erro ao gerar relatório: " + error.message);
                btn.innerHTML = textoOriginal;
                return;
            }

            const hojeLocal = new Date();
            const ano = hojeLocal.getFullYear();
            const mes = String(hojeLocal.getMonth() + 1).padStart(2, '0');
            const dia = String(hojeLocal.getDate()).padStart(2, '0');
            const dataHojeBusca = `${ano}-${mes}-${dia}`;
            const hojeBr = `${dia}/${mes}/${ano}`;

            const registrosHoje = data.filter(p => {
                if(!p.hora_registro) return false;
                return p.hora_registro.startsWith(dataHojeBusca);
            });

            if (registrosHoje.length === 0) {
                alert("Nenhum registro encontrado para a data de hoje.");
                btn.innerHTML = textoOriginal;
                return;
            }

            let pontosAgrupados = {};
            registrosHoje.forEach(p => {
                if (!pontosAgrupados[p.funcionario_id]) {
                    pontosAgrupados[p.funcionario_id] = [];
                }
                pontosAgrupados[p.funcionario_id].push(p);
            });

            const nomeObra = document.getElementById('nome-obra-titulo').innerText;
            
            let mensagem = `📋 *RELATÓRIO DE PONTO DIÁRIO*\n`;
            mensagem += `📍 *Obra:* ${nomeObra}\n`;
            mensagem += `📅 *Data:* ${hojeBr}\n\n`;

            Object.keys(pontosAgrupados).forEach(fId => {
                const func = equipeGlobal.find(e => e.id == fId);
                const nomeCurto = func ? func.nome.split(' ')[0] : `ID ${fId}`; 
                
                mensagem += `👷 *${nomeCurto}*\n`; 
                
                pontosAgrupados[fId].forEach(p => {
                    // MÁGICA 3: Corta direto do texto para o Zap ficar impecável
                    let horaExata = "00:00";
                    if (p.hora_registro.includes('T')) {
                        horaExata = p.hora_registro.split('T')[1].substring(0, 5);
                    } else if (p.hora_registro.includes(' ')) {
                        horaExata = p.hora_registro.split(' ')[1].substring(0, 5);
                    }
                    
                    let iconeStatus = p.status === 'VALIDADO' ? '✅' : '⏳';
                    let iconeTipo = p.tipo === 'ENTRADA' ? '📥' : '📤';
                    let txtTipo = p.tipo === 'ENTRADA' ? 'Entrada' : 'Saída';
                    
                    mensagem += `  ${iconeStatus} ${iconeTipo} ${horaExata} - ${txtTipo}\n`;
                });
                
                mensagem += `\n`; 
            });

            mensagem += `_Gerado por RV Sistemas_`;

            const urlFormatada = encodeURIComponent(mensagem);
            window.open(`https://api.whatsapp.com/send?text=${urlFormatada}`, '_blank');

            btn.innerHTML = textoOriginal;
        }

        function voltarSelecaoObra() {
            document.getElementById('painel-supervisor').classList.add('hidden');
            document.getElementById('btn-trocar-obra').classList.add('hidden');
            document.getElementById('selecao-obra').classList.remove('hidden');
            document.getElementById('area-qr-code').classList.add('hidden');
            document.getElementById('area-qr-code').classList.remove('flex');
            document.getElementById('img-qr-code').src = "";
            lucide.createIcons();
        }

      async function definirLocalObra() {
            const sel = document.getElementById('select-obra');
            if(!sel.value) return alert("Selecione a obra no menu acima primeiro!");

            const senhaAdmin = prompt("Acesso Restrito: Digite a senha de Administrador (RV) para alterar o GPS da obra:");
            
            if(senhaAdmin !== "rvadmin") { 
                return alert("❌ Senha Incorreta! Ação cancelada.");
            }

            const nomeObra = sel.options[sel.selectedIndex].text;
            if(!confirm(`Atenção: Isso vai cravar a sua localização GPS atual como o ponto oficial da obra '${nomeObra}'. Deseja continuar?`)) {
                return;
            }

            if (!("geolocation" in navigator)) return alert("Seu navegador não suporta GPS.");

            alert("Buscando satélites... Aguarde!"); 

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const novaLat = pos.coords.latitude;
                const novaLng = pos.coords.longitude;

                const { error } = await supabaseClient.from('jsp_obras')
                    .update({ lat: novaLat.toString(), lng: novaLng.toString() })
                    .eq('id', sel.value);

                if(error) {
                    alert("Erro ao salvar no banco: " + error.message);
                } else {
                    alert("✅ Localização da obra atualizada com sucesso no banco de dados!");
                }
            }, (err) => {
                alert("❌ Erro ao buscar GPS. Verifique se a localização está ativada no celular.");
            }, { enableHighAccuracy: true });
        }
    </script>
