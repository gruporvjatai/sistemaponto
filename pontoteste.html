<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bater Ponto - RV Sistemas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <style>
        /* transições suaves */
        .fade-out { opacity: 0; transition: opacity 0.3s; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Tela de erro (exibida se não houver obra definida) -->
    <div id="tela-erro" class="hidden w-full max-w-md bg-red-600 p-8 rounded-xl shadow-2xl text-center text-white">
        <h1 class="text-2xl font-black mb-2 uppercase">Acesso Indisponível</h1>
        <p id="msg-erro" class="font-bold text-red-100">Nenhuma obra selecionada. O encarregado precisa definir a obra primeiro.</p>
        <p class="mt-6 text-sm">Volte ao painel do encarregado e selecione uma obra.</p>
    </div>

    <div id="area-funcionario" class="hidden w-full max-w-md transition-all">
        <!-- Tela de registro -->
        <div id="tela-registro" class="bg-white p-8 rounded-xl shadow-2xl text-center border-t-4 border-blue-600">
            <img src="https://i.postimg.cc/PqdgXGF0/logo-rv-negociospng.png" alt="RV" class="h-11 mx-auto mb-4">
            <h1 class="text-2xl font-bold mb-2 text-slate-800 uppercase">Bater Ponto</h1>
            <p id="nome-obra-exibido" class="text-sm font-bold text-blue-600 mb-4">Carregando obra...</p>
            
            <div id="db-status" class="mb-3 p-3 rounded-lg bg-blue-50 text-blue-800 text-xs font-bold flex flex-col items-center gap-1 border border-blue-200">
                Conectando ao servidor...
            </div>

            <div id="gps-status" class="mb-6 p-3 rounded-lg bg-blue-50 text-blue-800 text-xs font-bold flex flex-col items-center gap-1 border border-blue-200">
                Aguardando GPS...
            </div>

            <div class="mb-6 text-left">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 text-center">Digite sua Matrícula (ID):</label>
                <input type="number" id="funcionario-matricula" placeholder="Ex: 100" class="w-full p-4 border-2 border-slate-200 rounded-lg shadow-sm text-center text-2xl font-black outline-none focus:border-blue-600 transition-colors bg-slate-50 tracking-widest disabled:opacity-50">
            </div>

            <button id="btn-registrar" onclick="registrarPonto()" disabled class="w-full p-4 bg-slate-800 text-white rounded-lg font-bold hover:bg-slate-900 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-lg shadow-lg">
                <span id="txt-btn">AGUARDE CONEXÃO...</span>
            </button>
        </div>

        <!-- Tela de sucesso (confirmação) -->
        <div id="tela-sucesso" class="hidden bg-emerald-600 p-8 rounded-xl shadow-2xl text-center text-white">
            <img src="https://i.postimg.cc/PqdgXGF0/logo-rv-negociospng.png" alt="RV" class="h-12 mx-auto mb-7 opacity-70 brightness-0 invert">
            <h1 class="text-3xl font-black mb-1 uppercase tracking-tight">Presença Confirmada</h1>
            <div class="bg-emerald-800/50 p-5 rounded-xl mb-6 backdrop-blur-sm border border-emerald-500/30 shadow-inner mt-4 flex flex-col items-center">
                <i data-lucide="check-circle" class="w-16 h-16 text-emerald-300 drop-shadow-lg mb-2"></i>
                <p class="text-lg font-bold text-emerald-100 uppercase tracking-widest mb-2">Registrado</p>
                <p id="nome-sucesso" class="w-full text-center text-sm font-black text-white mt-2 pt-4 border-t border-emerald-500/30 uppercase tracking-wide"></p>
            </div>
            <p id="contador-regressivo" class="text-sm font-bold text-emerald-200">A tela será limpa em 5 segundos...</p>
        </div>    
    </div>

    <script>
        (function() {
            // ---- Configurações ----
            const SUPABASE_URL = 'https://lyieiqhkspbowsrlngvn.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
            const RAIO_TOLERANCIA = 80; // metros
            const TEMPO_RESET = 5000;    // 5 segundos

            // Estado global
            let supabaseClient = null;
            let obraId = null;
            let obraNome = '';
            let obraLat = null, obraLng = null;
            let userLat = null, userLng = null;
            let dbOk = false, gpsOk = false;
            let equipeGlobal = [];
            let timerReset = null;

            // Elementos DOM
            const telaErro = document.getElementById('tela-erro');
            const areaFunc = document.getElementById('area-funcionario');
            const telaRegistro = document.getElementById('tela-registro');
            const telaSucesso = document.getElementById('tela-sucesso');
            const dbStatus = document.getElementById('db-status');
            const gpsStatus = document.getElementById('gps-status');
            const btnRegistrar = document.getElementById('btn-registrar');
            const txtBtn = document.getElementById('txt-btn');
            const inputMatricula = document.getElementById('funcionario-matricula');
            const nomeObraExibido = document.getElementById('nome-obra-exibido');
            const nomeSucesso = document.getElementById('nome-sucesso');
            const contador = document.getElementById('contador-regressivo');

            // Inicialização
            window.onload = function() {
                // Verifica se há obra definida no localStorage (definida pelo encarregado)
                obraId = localStorage.getItem('obra_atual_id');
                if (!obraId) {
                    telaErro.classList.remove('hidden');
                    return;
                }

                areaFunc.classList.remove('hidden');
                
                // Inicializa Supabase
                if (typeof supabase === 'undefined') {
                    dbStatus.innerHTML = 'Erro crítico: biblioteca do banco de dados não carregou.';
                    dbStatus.className = "mb-3 p-3 rounded-lg bg-red-100 text-red-800 text-xs font-bold";
                    return;
                }
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                // Inicia carregamentos
                carregarDadosBanco();
                iniciarGPS();
            };

            // ----- Banco de Dados -----
            async function carregarDadosBanco() {
                dbStatus.innerHTML = '⏳ Conectando ao servidor...';
                dbStatus.className = "mb-3 p-3 rounded-lg bg-blue-50 text-blue-800 text-xs font-bold";
                try {
                    // Busca dados da obra
                    const { data: obra, error } = await supabaseClient
                        .from('jsp_obras')
                        .select('nome, lat, lng')
                        .eq('id', obraId)
                        .single();
                    if (error) throw error;
                    
                    obraNome = obra.nome;
                    obraLat = parseFloat(obra.lat);
                    obraLng = parseFloat(obra.lng);
                    nomeObraExibido.textContent = `Obra: ${obraNome}`;
                    
                    // Carrega equipe (apenas funcionários ativos desta obra)
                    const { data: equipe } = await supabaseClient
                        .from('jsp_equipe')
                        .select('id, nome, matricula, obra_atual_id')
                        .eq('obra_atual_id', obraId)
                        .eq('ativo', true);
                    equipeGlobal = equipe || [];
                    
                    dbOk = true;
                    dbStatus.innerHTML = `✅ Conectado à obra: ${obraNome}`;
                    dbStatus.className = "mb-3 p-3 rounded-lg bg-emerald-50 text-emerald-800 text-xs font-bold";
                    verificarLiberacao();
                } catch (err) {
                    dbOk = false;
                    dbStatus.innerHTML = `❌ Erro ao carregar dados da obra. Verifique a internet.`;
                    dbStatus.className = "mb-3 p-3 rounded-lg bg-red-100 text-red-800 text-xs font-bold";
                    console.error(err);
                }
                lucide.createIcons();
            }

            // ----- GPS -----
            function iniciarGPS() {
                gpsStatus.innerHTML = '⏳ Buscando localização... Permita o acesso.';
                gpsStatus.className = "mb-6 p-3 rounded-lg bg-blue-50 text-blue-800 text-xs font-bold";
                if (!navigator.geolocation) {
                    gpsOk = false;
                    gpsStatus.innerHTML = '❌ GPS não suportado.';
                    gpsStatus.className = "mb-6 p-3 rounded-lg bg-red-100 text-red-800 text-xs font-bold";
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        userLat = pos.coords.latitude;
                        userLng = pos.coords.longitude;
                        gpsOk = true;
                        gpsStatus.innerHTML = '✅ Localização capturada.';
                        gpsStatus.className = "mb-6 p-3 rounded-lg bg-emerald-50 text-emerald-800 text-xs font-bold";
                        verificarLiberacao();
                    },
                    (err) => {
                        gpsOk = false;
                        let msg = "Erro no GPS.";
                        if (err.code === 1) msg = "Acesso à localização negado. Libere nas configurações.";
                        else if (err.code === 2) msg = "Sinal indisponível. Vá para área aberta.";
                        else if (err.code === 3) msg = "Tempo esgotado. Tente novamente.";
                        gpsStatus.innerHTML = `❌ ${msg} <button onclick="iniciarGPS()" class="block mt-2 mx-auto px-4 py-2 bg-red-600 text-white rounded font-bold text-xs">Tentar novamente</button>`;
                        gpsStatus.className = "mb-6 p-3 rounded-lg bg-red-100 text-red-800 text-xs font-bold";
                    },
                    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
                );
                lucide.createIcons();
            }

            // ----- Liberação do botão -----
            function verificarLiberacao() {
                if (!dbOk || !gpsOk) return;
                
                // Calcular distância
                const R = 6371e3;
                const φ1 = userLat * Math.PI/180;
                const φ2 = obraLat * Math.PI/180;
                const Δφ = (obraLat - userLat) * Math.PI/180;
                const Δλ = (obraLng - userLng) * Math.PI/180;
                const a = Math.sin(Δφ/2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) ** 2;
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distancia = R * c;
                
                if (distancia <= RAIO_TOLERANCIA) {
                    gpsStatus.innerHTML = `📍 Dentro do perímetro (${Math.round(distancia)}m)`;
                    gpsStatus.className = "mb-6 p-3 rounded-lg bg-emerald-100 text-emerald-800 text-sm font-black";
                    btnRegistrar.disabled = false;
                    txtBtn.innerText = "REGISTRAR PONTO";
                } else {
                    gpsStatus.innerHTML = `❌ Fora do perímetro (${Math.round(distancia)}m). Aproxime-se da obra.`;
                    gpsStatus.className = "mb-6 p-3 rounded-lg bg-red-100 text-red-800 text-xs font-bold";
                    btnRegistrar.disabled = true;
                    txtBtn.innerText = "FORA DO PERÍMETRO";
                }
                lucide.createIcons();
            }

            // ----- Registrar ponto (como PENDENTE, para o encarregado confirmar depois) -----
            window.registrarPonto = async function() {
                const matricula = inputMatricula.value.trim();
                if (!matricula) {
                    alert("Digite a matrícula!");
                    return;
                }

                const funcionario = equipeGlobal.find(f => f.matricula == matricula);
                if (!funcionario) {
                    alert("Matrícula não encontrada ou funcionário não pertence a esta obra.");
                    return;
                }

                // Verificação de duplicidade (período manhã/tarde)
                const agora = new Date();
                const horaAtual = agora.getHours();
                const dataHoje = agora.toISOString().split('T')[0];
                let horaInicio, horaFim;
                if (horaAtual >= 4 && horaAtual < 12) {
                    horaInicio = "04:00:00";
                    horaFim = "11:59:59";
                } else {
                    horaInicio = "12:00:00";
                    horaFim = "19:00:00";
                }
                
                // Verifica se já existe registro de entrada hoje nesse período
                const { data: existentes, error: errExist } = await supabaseClient
                    .from('jsp_ponto_diario')
                    .select('id')
                    .eq('funcionario_id', funcionario.id)
                    .eq('obra_id', obraId)
                    .in('tipo', ['ENTRADA', 'AJUSTE_MANUAL'])
                    .gte('hora_registro', `${dataHoje} ${horaInicio}`)
                    .lte('hora_registro', `${dataHoje} ${horaFim}`);
                
                if (errExist) {
                    alert("Erro ao verificar duplicidade.");
                    return;
                }
                if (existentes && existentes.length > 0) {
                    alert("Você já bateu o ponto neste período (manhã ou tarde).");
                    return;
                }

                // Desabilita botão durante o envio
                btnRegistrar.disabled = true;
                txtBtn.innerHTML = 'ENVIANDO...';
                
                const horaLocal = agora.toLocaleTimeString('pt-BR', { hour12: false });
                const horaRegistro = `${dataHoje} ${horaLocal}`;
                
                const { error } = await supabaseClient.from('jsp_ponto_diario').insert([{
                    funcionario_id: funcionario.id,
                    obra_id: obraId,
                    tipo: 'PENDENTE',        // Será confirmado pelo encarregado
                    status: 'PENDENTE',
                    hora_registro: horaRegistro,
                    lat_registro: userLat ? userLat.toString() : '',
                    lng_registro: userLng ? userLng.toString() : ''
                }]);

                if (error) {
                    alert("Erro ao registrar: " + error.message);
                    btnRegistrar.disabled = false;
                    txtBtn.innerHTML = 'REGISTRAR PONTO';
                } else {
                    // Mostra tela de sucesso
                    nomeSucesso.innerText = `${funcionario.nome} (ID: ${funcionario.matricula})`;
                    telaRegistro.classList.add('hidden');
                    telaSucesso.classList.remove('hidden');
                    
                    // Limpa o campo para o próximo
                    inputMatricula.value = '';
                    
                    // Inicia contagem para resetar a tela
                    let segundos = 5;
                    contador.textContent = `A tela será limpa em ${segundos} segundos...`;
                    timerReset = setInterval(() => {
                        segundos--;
                        if (segundos <= 0) {
                            clearInterval(timerReset);
                            // Volta para tela de registro
                            telaSucesso.classList.add('hidden');
                            telaRegistro.classList.remove('hidden');
                            btnRegistrar.disabled = false;
                            txtBtn.innerHTML = 'REGISTRAR PONTO';
                            // Reabilita botão e foca no campo
                            inputMatricula.focus();
                        } else {
                            contador.textContent = `A tela será limpa em ${segundos} segundos...`;
                        }
                    }, 1000);
                }
                lucide.createIcons();
            };

            // Permite reiniciar GPS manualmente (exposto globalmente)
            window.iniciarGPS = iniciarGPS;

            // Previne conflitos com timer ao fechar
            window.addEventListener('beforeunload', function() {
                if (timerReset) clearInterval(timerReset);
            });

            // Foco automático ao carregar
            inputMatricula.focus();
        })();
    </script>
</body>
</html>
