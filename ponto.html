<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bater Ponto - RV Sistemas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="tela-erro" class="hidden w-full max-w-md bg-red-600 p-8 rounded-xl shadow-2xl text-center text-white">
        <h1 class="text-2xl font-black mb-2 uppercase">Acesso Bloqueado</h1>
        <p id="msg-erro" class="font-bold text-red-100">O QR Code lido é inválido ou faltam parâmetros.</p>
        <p class="mt-6 text-sm">Peça ao Encarregado para gerar um novo QR Code.</p>
    </div>

    <div id="area-funcionario" class="hidden w-full max-w-md transition-all">
        <div id="tela-registro" class="bg-white p-8 rounded-xl shadow-2xl text-center border-t-4 border-blue-600 relative overflow-hidden">
            <img src="https://i.postimg.cc/PqdgXGF0/logo-rv-negociospng.png" alt="RV Portal" class="h-11 mx-auto mb-4">
            <h1 class="text-2xl font-bold mb-4 text-slate-800 uppercase">Bater Ponto</h1>
            
            <div id="db-status" class="mb-3 p-3 rounded-lg bg-blue-50 text-blue-800 text-xs font-bold flex flex-col items-center gap-1 border border-blue-200">
                Conectando ao servidor...
            </div>

            <div id="gps-status" class="mb-6 p-3 rounded-lg bg-blue-50 text-blue-800 text-xs font-bold flex flex-col items-center gap-1 border border-blue-200">
                Aguardando GPS... Autorize no navegador.
            </div>

            <div class="mb-6 text-left">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 text-center">Digite seu ID:</label>
                <input type="number" id="funcionario-matricula" placeholder="Ex: 100" class="w-full p-4 border-2 border-slate-200 rounded-lg shadow-sm text-center text-2xl font-black outline-none focus:border-blue-600 transition-colors bg-slate-50 tracking-widest disabled:opacity-50">
            </div>

            <button id="btn-registrar" onclick="registrarPontoPendente()" disabled class="w-full p-4 bg-slate-800 text-white rounded-lg font-bold hover:bg-slate-900 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-lg shadow-lg">
                <span id="txt-btn">AGUARDE CONEXÃO...</span>
            </button>
        </div>

        <div id="tela-sucesso" class="hidden bg-emerald-600 p-8 rounded-xl shadow-2xl text-center text-white relative">
            <img src="https://i.postimg.cc/PqdgXGF0/logo-rv-negociospng.png" alt="RV" class="h-12 mx-auto mb-7 opacity-70 brightness-0 invert">
            <h1 class="text-3xl font-black mb-1 uppercase tracking-tight">Presença confirmada</h1>
            
            <!--<div class="bg-emerald-800/50 p-5 rounded-xl mb-6 backdrop-blur-sm border border-emerald-500/30 shadow-inner mt-4">
                <p class="text-xs font-bold text-emerald-200 uppercase mb-1">Horário</p>
                <!--<p id="hora-sucesso" class="text-5xl font-black tabular-nums tracking-wider drop-shadow-md"></p>
                <p id="data-sucesso" class="text-sm font-bold text-emerald-200 mt-1"></p>
                <p id="nome-sucesso" class="text-sm font-black text-white mt-4 pt-4 border-t border-emerald-500/30 uppercase tracking-wide"></p>
            </div>-->

            <div class="bg-emerald-800/50 p-5 rounded-xl mb-6 backdrop-blur-sm border border-emerald-500/30 shadow-inner mt-4 flex flex-col items-center">
                <i data-lucide="check-circle" class="w-16 h-16 text-emerald-300 drop-shadow-lg mb-2"></i>
                <p class="text-lg font-bold text-emerald-100 uppercase tracking-widest mb-2">Confirmado</p>
                
                <p id="nome-sucesso" class="w-full text-center text-sm font-black text-white mt-2 pt-4 border-t border-emerald-500/30 uppercase tracking-wide"></p>
            </div>

            <div class="mt-4 flex flex-col items-center justify-center gap-1 opacity-75">
               <!-- <p class="text-[10px] font-bold uppercase tracking-widest text-emerald-100">Este é seu comprovante de ponto. Tire um print desta tela!</p> -->
            </div>
        </div>    
    </div>

    <script>
        // FUNÇÃO BLINDADA PARA ÍCONES (Se a internet falhar e não carregar a biblioteca, o sistema NÃO quebra)
        function carregarIcones() {
            try {
                if (typeof lucide !== 'undefined') lucide.createIcons();
            } catch(e) { console.log("Ícones não carregaram, mas o sistema segue rodando."); }
        }
        carregarIcones();

        // CONSTANTES GERAIS
        const SUPABASE_URL = 'https://lyieiqhkspbowsrlngvn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
        const TRAVAR_POR_OBRA = true;
        const RAIO_TOLERANCIA = 80;

        const urlParams = new URLSearchParams(window.location.search);
        const obraId = urlParams.get('obra_id'); 
        const tokenRecebido = urlParams.get('token'); 
        
        let dbOk = false;
        let gpsOk = false;
        let obraLatOficial = null;
        let obraLngOficial = null;
        let userLat = null;
        let userLng = null;
        let equipeGlobal = []; 
        let supabaseClient = null;

        window.onload = () => {
            // FORÇA A DESTRUIÇÃO DE QUALQUER TELA DE LOADING ANTIGA (Caso você esteja mesclando códigos)
            const ghostLoading = document.getElementById('tela-loading');
            if (ghostLoading) ghostLoading.remove();

            if (!obraId || !tokenRecebido) {
                document.getElementById('tela-erro').classList.remove('hidden');
                return;
            } 
            
            document.getElementById('area-funcionario').classList.remove('hidden');
            
            // VERIFICA SE O SUPABASE CONSEGUIU SER BAIXADO PELA REDE 4G/WIFI DA OBRA
            if (typeof supabase === 'undefined') {
                const dbStatus = document.getElementById('db-status');
                dbStatus.innerHTML = `Falha crítica de rede. Não foi possível baixar os pacotes de banco de dados. Recarregue a página.`;
                dbStatus.className = "mb-3 p-3 rounded-lg bg-red-100 text-red-800 text-xs font-bold border border-red-300 text-center";
                return; // Para tudo por aqui
            }

            // Se chegou aqui, as bibliotecas baixaram. Inicializa o banco.
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // Dispara buscas independentes
            carregarDadosBanco();
            iniciarGPS();
        };

        // 1. BANCO DE DADOS
       async function carregarDadosBanco() {
            const dbStatus = document.getElementById('db-status');
            dbStatus.innerHTML = `⏳ Conectando ao servidor da RV...`;
            dbStatus.className = "mb-3 p-3 rounded-lg bg-blue-50 text-blue-800 text-xs font-bold border border-blue-200 text-center";
            
            try {
                // Adicionando um timestamp na requisição para forçar o Supabase a não usar Cache
                const { data: obra, error: errorObra } = await supabaseClient
                    .from('jsp_obras')
                    .select('nome, lat, lng, token_diario, data_token')
                    .eq('id', obraId)
                    .single();

                if (errorObra || !obra) throw new Error("Obra não encontrada.");

                // Pega a data local do celular
                const hoje = new Date().toLocaleDateString('en-CA'); 
                
                // BLINDAGEM: Converte tudo para texto e remove espaços em branco das pontas
                const tokenDaURL = String(tokenRecebido).trim();
                const tokenDoBanco = String(obra.token_diario).trim();
                const dataDoBanco = String(obra.data_token).trim();

                // Validação rigorosa
                if (tokenDoBanco !== tokenDaURL || dataDoBanco !== hoje) {
                    document.getElementById('area-funcionario').classList.add('hidden');
                    
                    // O X-9: Mostra na tela exatamente o que está divergindo para você debugar!
                    document.getElementById('msg-erro').innerHTML = `
                        QR Code Inválido ou Vencido.<br><br>
                        <div class="text-left bg-red-800 p-3 rounded text-xs mt-2 font-mono">
                            <strong>DIVERGÊNCIA ENCONTRADA:</strong><br>
                            Token URL (QR Code): <span class="text-yellow-300">${tokenDaURL}</span><br>
                            Token no Banco (DB): <span class="text-yellow-300">${tokenDoBanco}</span><br>
                            Data Celular (Hoje): <span class="text-blue-300">${hoje}</span><br>
                            Data no Banco (DB): <span class="text-blue-300">${dataDoBanco}</span>
                        </div>
                    `;
                    document.getElementById('tela-erro').classList.remove('hidden');
                    return;
                }

                const { data: equipa } = await supabaseClient.from('jsp_equipe').select('id, nome, matricula, obra_atual_id');
                equipeGlobal = equipa || [];
                
                obraLatOficial = parseFloat(obra.lat);
                obraLngOficial = parseFloat(obra.lng);
                dbOk = true;
                
                dbStatus.innerHTML = `✅ Obra confirmada: ${obra.nome}`;
                dbStatus.className = "mb-3 p-3 rounded-lg bg-emerald-50 text-emerald-800 text-xs font-bold border border-emerald-200 text-center";
                
                verificarLiberacao();
            } catch (err) {
                dbOk = false;
                dbStatus.innerHTML = `❌ Falha na internet ou Banco! <button onclick="carregarDadosBanco()" class="block mt-2 mx-auto px-4 py-2 bg-red-600 text-white rounded font-bold uppercase">Tentar Reconectar</button>`;
                dbStatus.className = "mb-3 p-3 rounded-lg bg-red-50 text-red-800 text-xs border border-red-200 text-center";
                console.error(err);
            }
            carregarIcones();
        }

        // 2. GPS REVISADO PARA SMARTPHONES
        function iniciarGPS() {
            const gpsStatus = document.getElementById('gps-status');
            gpsStatus.innerHTML = `⏳ Buscando satélite... Se pedir, clique em "Permitir" na tela.`;
            gpsStatus.className = "mb-6 p-3 rounded-lg bg-blue-50 text-blue-800 text-xs font-bold border border-blue-200 text-center";

            if (!("geolocation" in navigator)) {
                gpsOk = false;
                gpsStatus.innerHTML = `❌ GPS não suportado neste aparelho.`;
                gpsStatus.className = "mb-6 p-3 rounded-lg bg-red-100 text-red-800 text-xs font-bold text-center";
                return;
            }

            // O timeout foi para 25 segundos. Se a obra tiver estrutura metálica, o GPS de celular básico pena para achar satélite.
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    gpsOk = true;
                    
                    gpsStatus.innerHTML = `✅ Sinal de GPS capturado!`;
                    gpsStatus.className = "mb-6 p-3 rounded-lg bg-emerald-50 text-emerald-800 text-xs font-bold border border-emerald-200 text-center";
                    verificarLiberacao();
                },
                (err) => {
                    gpsOk = false;
                    let msg = "Erro ao buscar GPS.";
                    if (err.code === 1) msg = "Você negou o acesso. Libere o GPS no navegador e recarregue.";
                    if (err.code === 2) msg = "Sinal de GPS indisponível. Vá para uma área aberta.";
                    if (err.code === 3) msg = "Tempo esgotado. O celular não encontrou o satélite.";
                    
                    gpsStatus.innerHTML = `❌ ${msg} <button onclick="iniciarGPS()" class="block mt-2 mx-auto px-4 py-2 bg-red-600 text-white rounded font-bold uppercase">Buscar GPS de Novo</button>`;
                    gpsStatus.className = "mb-6 p-3 rounded-lg bg-red-50 text-red-800 text-xs border border-red-200 text-center";
                },
                { enableHighAccuracy: true, timeout: 25000, maximumAge: 0 }
            );
            carregarIcones();
        }

        // 3. CENTRAL DE LIBERAÇÃO
        function verificarLiberacao() {
            if (!dbOk || !gpsOk) return;

            const R = 6371e3; 
            const φ1 = userLat * Math.PI/180;
            const φ2 = obraLatOficial * Math.PI/180;
            const Δφ = (obraLatOficial-userLat) * Math.PI/180;
            const Δλ = (obraLngOficial-userLng) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distancia = R * c;

            const gpsStatus = document.getElementById('gps-status');

            if (distancia <= RAIO_TOLERANCIA) { 
                gpsStatus.innerHTML = `📍 Você está na obra. (${Math.round(distancia)}m)`;
                gpsStatus.className = "mb-6 p-3 rounded-lg bg-emerald-100 text-emerald-800 text-sm font-black border border-emerald-300 text-center";
                
                document.getElementById('btn-registrar').disabled = false;
                document.getElementById('txt-btn').innerText = "REGISTRAR PONTO";
            } else {
                gpsStatus.innerHTML = `❌ Muito longe! (${Math.round(distancia)}m de distância da obra). Chegue mais perto do perímetro.<br><button onclick="iniciarGPS()" class="mt-2 px-4 py-2 bg-red-600 text-white rounded font-bold uppercase text-xs">Atualizar Posição</button>`;
                gpsStatus.className = "mb-6 p-3 rounded-lg bg-red-100 text-red-800 text-xs font-bold border border-red-300 text-center";
            }
            carregarIcones();
        }

        // 4. ENVIO PARA O SUPABASE
        async function registrarPontoPendente() {
            const inputDigitado = document.getElementById('funcionario-matricula').value;
            if(!inputDigitado) return alert("Por favor, digite a sua matrícula!");

            const funcionario = equipeGlobal.find(e => e.matricula == inputDigitado);
            if(!funcionario) return alert("Matrícula não encontrada! Verifique os números.");

            if (TRAVAR_POR_OBRA && funcionario.obra_atual_id != obraId) {
                return alert("❌ ACESSO NEGADO: Sua matrícula não está vinculada a esta obra. Procure o Encarregado!");
            }

            const btn = document.getElementById('btn-registrar');
            btn.innerHTML = 'ENVIANDO DADOS...';
            btn.disabled = true;

            const dataAtual = new Date();
            const horaExata = dataAtual.toLocaleTimeString('pt-BR', { hour12: false });
            const ano = dataAtual.getFullYear();
            const mes = String(dataAtual.getMonth() + 1).padStart(2, '0');
            const dia = String(dataAtual.getDate()).padStart(2, '0');
            const horaLocalParaSalvar = `${ano}-${mes}-${dia} ${horaExata}`;
            
            const { error } = await supabaseClient.from('jsp_ponto_diario').insert([{
                funcionario_id: funcionario.id,
                obra_id: obraId,
                tipo: 'PENDENTE',       
                status: 'PENDENTE',     
                hora_registro: horaLocalParaSalvar, 
                lat_registro: userLat ? userLat.toString() : '',
                lng_registro: userLng ? userLng.toString() : ''
            }]);

            if (error) {
                alert("Erro ao enviar: " + error.message);
                btn.innerHTML = 'REGISTRAR PONTO';
                btn.disabled = false;
            } else {
                document.getElementById('hora-sucesso').innerText = horaExata;
                document.getElementById('data-sucesso').innerText = dataAtual.toLocaleDateString('pt-BR');
                document.getElementById('nome-sucesso').innerText = `${funcionario.nome} (ID: ${funcionario.matricula})`;
                
                document.getElementById('tela-registro').classList.add('hidden');
                document.getElementById('tela-sucesso').classList.remove('hidden');
                document.getElementById('funcionario-matricula').value = ''; 
            }
        }
    </script>
</body>
</html>
