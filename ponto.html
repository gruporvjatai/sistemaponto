<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bater Ponto - RV Sistemas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="tela-erro" class="hidden w-full max-w-md bg-red-600 p-8 rounded-xl shadow-2xl text-center text-white">
        <i data-lucide="shield-alert" class="w-20 h-20 mx-auto mb-4 text-red-200"></i>
        <h1 class="text-2xl font-black mb-2 uppercase">Acesso Bloqueado</h1>
        <p id="msg-erro" class="font-bold text-red-100">O QR Code lido é inválido ou já expirou.</p>
        <p class="mt-6 text-sm">Peça ao Encarregado para gerar o código de hoje.</p>
    </div>

    <div id="area-funcionario" class="hidden w-full max-w-md transition-all">
        <div id="tela-registro" class="bg-white p-8 rounded-xl shadow-2xl text-center border-t-4 border-blue-600 relative overflow-hidden">
            <img src="https://i.postimg.cc/PqdgXGF0/logo-rv-negociospng.png" alt="RV Portal" class="h-16 mx-auto mb-4">
            <h1 class="text-2xl font-bold mb-2 text-slate-800 uppercase">Bater Ponto</h1>
            <p id="nome-obra" class="text-slate-500 mb-6 text-sm font-bold bg-slate-100 p-2 rounded">📍 Verificando dados da obra...</p>

            <div id="gps-status" class="mb-6 p-4 rounded-lg bg-blue-50 text-blue-800 text-sm font-bold flex items-center justify-center gap-2 border border-blue-200">
                <i data-lucide="map-pin" class="w-5 h-5 animate-bounce"></i> Consultando localização oficial...
            </div>

            <div class="mb-6 text-left">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 text-center">Sua Matrícula (ID):</label>
                <input type="number" id="funcionario-matricula" placeholder="Ex: 100" class="w-full p-4 border-2 border-slate-200 rounded-lg shadow-sm text-center text-2xl font-black outline-none focus:border-blue-600 transition-colors bg-slate-50 tracking-widest">
            </div>

            <button id="btn-registrar" onclick="registrarPontoPendente()" disabled class="w-full p-4 bg-slate-800 text-white rounded-lg font-bold hover:bg-slate-900 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-lg shadow-lg">
                <i data-lucide="fingerprint" class="w-6 h-6"></i> REGISTRAR PONTO
            </button>
        </div>

        <div id="tela-sucesso" class="hidden bg-emerald-600 p-8 rounded-xl shadow-2xl text-center text-white">
            <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                <i data-lucide="check-circle" class="w-16 h-16 text-emerald-600"></i>
            </div>
            <h1 class="text-3xl font-black mb-2 uppercase">Ponto Registrado!</h1>
            <p class="text-emerald-100 mb-6 text-sm font-bold">Aguardando validação do encarregado.</p>
            
            <div class="bg-emerald-800/50 p-4 rounded-lg mb-8 backdrop-blur-sm border border-emerald-500/30">
                <p class="text-sm font-bold text-emerald-200 uppercase mb-1">Horário do Registro</p>
                <p id="hora-sucesso" class="text-5xl font-black tabular-nums tracking-wider"></p>
                <p id="data-sucesso" class="text-sm font-bold text-emerald-200 mt-2"></p>
                <p id="nome-sucesso" class="text-sm font-bold text-white mt-4 pt-4 border-t border-emerald-500/30 uppercase"></p>
            </div>

            <button onclick="voltarParaRegistro()" class="mt-6 p-3 bg-emerald-800 text-white rounded-lg w-full text-sm font-bold hover:bg-emerald-900 transition">Novo Registro (Voltar)</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const SUPABASE_URL = 'https://lyieiqhkspbowsrlngvn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const obraId = urlParams.get('obra_id'); 
        const tokenRecebido = urlParams.get('token'); 
        
        let obraLatOficial = null;
        let obraLngOficial = null;
        let userLat = null;
        let userLng = null;
        let equipeGlobal = []; 

        if (!obraId || !tokenRecebido) {
            mostrarErro("QR Code inválido. Parâmetros ausentes.");
        } else {
            inicializarSistemaSeguro();
        }

        function mostrarErro(mensagem) {
            document.getElementById('area-funcionario').classList.add('hidden');
            document.getElementById('tela-erro').classList.remove('hidden');
            document.getElementById('msg-erro').innerText = mensagem;
        }

        async function inicializarSistemaSeguro() {
            try {
                // 1. Busca a Obra e o Token no banco de dados
                const { data: obra, error: errorObra } = await supabaseClient
                    .from('jsp_obras')
                    .select('nome, lat, lng, token_diario, data_token')
                    .eq('id', obraId)
                    .single();

                if (errorObra || !obra) throw new Error("Obra não encontrada.");

                // 2. VALIDAÇÃO DE SEGURANÇA (O SEGREDO AQUI)
                const hoje = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
                
                if (obra.token_diario !== tokenRecebido || obra.data_token !== hoje) {
                    mostrarErro("Este QR Code expirou! Peça para o encarregado gerar o código de hoje.");
                    return; // Bloqueia a execução do resto do código
                }

                // Se passou da trava, libera a tela
                document.getElementById('area-funcionario').classList.remove('hidden');
                document.getElementById('nome-obra').innerText = "📍 " + obra.nome;
                obraLatOficial = parseFloat(obra.lat);
                obraLngOficial = parseFloat(obra.lng);

                await carregarEquipe();
                pegarLocalizacaoUsuario();

            } catch (err) {
                mostrarErro(err.message);
            }
        }

        async function carregarEquipe() {
            const { data } = await supabaseClient.from('jsp_equipe').select('id, nome, matricula');
            if (data) equipeGlobal = data; 
        }

        function pegarLocalizacaoUsuario() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    validarDistancia();
                }, (err) => {
                    const st = document.getElementById('gps-status');
                    st.innerHTML = '<i data-lucide="map-pin-off" class="w-5 h-5"></i> ❌ GPS Desativado.';
                    st.className = "mb-6 p-4 rounded-lg bg-red-100 text-red-800 text-sm font-bold flex items-center gap-2";
                    lucide.createIcons();
                }, { enableHighAccuracy: true });
            }
        }

        function validarDistancia() {
            const R = 6371e3; 
            const φ1 = userLat * Math.PI/180;
            const φ2 = obraLatOficial * Math.PI/180;
            const Δφ = (obraLatOficial-userLat) * Math.PI/180;
            const Δλ = (obraLngOficial-userLng) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distancia = R * c;

            const statusDiv = document.getElementById('gps-status');

            if (distancia <= 100) { // 100 metros de tolerância
                statusDiv.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i> ✅ Localização Confirmada! (${Math.round(distancia)}m)`;
                statusDiv.className = "mb-6 p-4 rounded-lg bg-emerald-100 text-emerald-800 text-sm font-bold flex items-center justify-center gap-2";
                document.getElementById('btn-registrar').disabled = false;
            } else {
                statusDiv.innerHTML = `<i data-lucide="alert-triangle" class="w-5 h-5"></i> ❌ Fora da obra (${Math.round(distancia)}m de distância).`;
                statusDiv.className = "mb-6 p-4 rounded-lg bg-red-100 text-red-800 text-sm font-bold flex items-center gap-2";
            }
            lucide.createIcons();
        }

        async function registrarPontoPendente() {
            const inputDigitado = document.getElementById('funcionario-matricula').value;
            if(!inputDigitado) return alert("Digite sua matrícula!");

            const funcionario = equipeGlobal.find(e => e.matricula == inputDigitado);
            if(!funcionario) return alert("Matrícula não encontrada!");

            const btn = document.getElementById('btn-registrar');
            btn.innerHTML = '<i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i> REGISTRANDO...';
            btn.disabled = true;
            lucide.createIcons();

            const dataAtual = new Date();
            const horaExata = dataAtual.toLocaleTimeString('pt-BR', { hour12: false });
            
            const { error } = await supabaseClient.from('jsp_ponto_diario').insert([{
                funcionario_id: funcionario.id,
                obra_id: obraId,
                tipo: 'PENDENTE',       
                status: 'PENDENTE',     
                hora_registro: dataAtual.toISOString(), 
                lat_registro: userLat ? userLat.toString() : '',
                lng_registro: userLng ? userLng.toString() : ''
            }]);

            if (error) {
                alert("Erro: " + error.message);
                btn.innerHTML = '<i data-lucide="fingerprint" class="w-6 h-6"></i> REGISTRAR PONTO';
                btn.disabled = false;
            } else {
                document.getElementById('hora-sucesso').innerText = horaExata;
                document.getElementById('data-sucesso').innerText = dataAtual.toLocaleDateString('pt-BR');
                document.getElementById('nome-sucesso').innerText = `${funcionario.nome} (ID: ${funcionario.matricula})`;
                
                document.getElementById('tela-registro').classList.add('hidden');
                document.getElementById('tela-sucesso').classList.remove('hidden');
                document.getElementById('funcionario-matricula').value = ''; 
            }
            lucide.createIcons();
        }

        function voltarParaRegistro() {
            document.getElementById('tela-sucesso').classList.add('hidden');
            document.getElementById('tela-registro').classList.remove('hidden');
            document.getElementById('btn-registrar').innerHTML = '<i data-lucide="fingerprint" class="w-6 h-6"></i> REGISTRAR PONTO';
            document.getElementById('btn-registrar').disabled = false;
            lucide.createIcons();
        }
    </script>
</body>
</html>
