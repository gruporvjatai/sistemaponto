<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cadastro de Equipe - RV Negócios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="application-name" content="RV Negócios">
    <meta name="apple-mobile-web-app-title" content="RV Negócios">
    <meta name="theme-color" content="#0f172a"> 
    <link rel="manifest" href="manifest.json">
    
    <style>
      body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
      
      .loader { border: 3px solid #e2e8f0; border-top: 3px solid #1d4ed8; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      @media print {
        header, #loading, #toast, .no-print { display: none !important; }
      }
    </style>
  </head>
  <body class="text-slate-800">

    <header class="bg-slate-900 text-white p-4 sticky top-0 z-30 shadow-md flex justify-between items-center no-print">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-white p-0.5 overflow-hidden">
          <img src="logo.png" onerror="this.src='https://i.postimg.cc/PqdgXGF0/logo-rv-negociospng.png'" class="w-full h-full object-contain" />
        </div>
        <h1 class="font-bold tracking-wide text-blue-400 text-sm">RV EQUIPE</h1>
      </div>
      <div class="flex gap-4 items-center">
        <button onclick="window.location.reload()" class="text-slate-400 hover:text-blue-400"><i data-lucide="refresh-cw"></i></button>
        <button onclick="fazerLogout()" class="text-slate-400 hover:text-red-400"><i data-lucide="log-out"></i></button>
      </div>
    </header>

    <div id="loading" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center">
       <div class="bg-white p-6 rounded-2xl flex flex-col items-center shadow-2xl"><div class="loader mb-3"></div><span class="font-bold text-slate-700 text-sm">Aguarde...</span></div>
    </div>
    <div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm z-[100] transition-all text-center w-[90%] max-w-sm"></div>

    <main class="p-4" id="main-content">
      <div id="view-equipe" class="relative min-h-[80vh] pb-10">
          <div class="flex items-center gap-3 mb-4">
              <h2 class="text-xl font-bold flex-1 flex items-center gap-2"><i data-lucide="users" class="text-blue-700"></i> Funcionários</h2>
              <button onclick="openEquipeForm()" class="bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-bold shadow flex items-center gap-2 active:scale-95 transition-transform"><i data-lucide="user-plus" class="w-4 h-4"></i> Novo</button>
          </div>
          
          <div class="flex gap-2 mb-3">
              <div class="relative flex-1">
                  <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-4 h-4"></i>
                  <input type="text" id="eqp-search" placeholder="Buscar nome..." class="w-full pl-9 p-2.5 bg-white border border-slate-200 rounded-xl text-xs outline-none focus:border-blue-500 shadow-sm" onkeyup="renderEquipe()">
              </div>
          </div>
          <div class="flex gap-2 mb-4">
              <select id="eqp-filter-obra" onchange="renderEquipe()" class="flex-1 p-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 outline-none focus:border-blue-500 shadow-sm">
                  <option value="">Todas as Obras</option>
              </select>
              <select id="eqp-filter-status" onchange="renderEquipe()" class="flex-1 p-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 outline-none focus:border-blue-500 shadow-sm">
                  <option value="true" selected>Apenas Ativos</option>
                  <option value="">Todos os Status</option>
                  <option value="false">Inativos</option>
              </select>
          </div>

          <!-- NOVO FILTRO DE TIPO -->
          <div class="mb-4">
              <select id="eqp-filter-tipo" onchange="renderEquipe()" class="w-full p-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 outline-none focus:border-blue-500 shadow-sm">
                  <option value="todos">Todos os Tipos</option>
                  <option value="diaria">Diária (Próprios)</option>
                  <option value="metro">Metro (Terceirizados)</option>
              </select>
          </div>

          <div id="equipe-list" class="flex flex-col gap-2"></div>
      </div>
    </main>

    <div id="overlay-forms" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-end justify-center no-print">

      <!-- FORMULÁRIO UNIFICADO DE EQUIPE / TERCEIRIZADO -->
      <div id="equipe-form-container" class="hidden w-full bg-white rounded-t-3xl p-5 pb-10 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <h3 class="font-black text-lg mb-4 flex justify-between items-center text-slate-800">
                Cadastro de Colaborador 
                <button type="button" onclick="closeOverlayForm('equipe-form-container')" class="p-1.5 bg-slate-100 text-slate-500 rounded-full active:bg-slate-200"><i data-lucide="x" class="w-5 h-5"></i></button>
            </h3>
            <form onsubmit="saveEquipe(event)" class="space-y-3">
                <input type="hidden" id="eqp-id">
                <input type="hidden" id="eqp-tipo-origem" value="equipe"> <!-- NOVO -->
                
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Nome Completo <span class="text-red-500">*</span></label>
                    <input type="text" id="eqp-nome" required placeholder="Ex: João da Silva" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-blue-500 font-bold text-slate-800">
                </div>
                
                <!-- NOVO: Select de categoria com opção Terceirizado -->
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Categoria / Função <span class="text-red-500">*</span></label>
                    <select id="eqp-categoria" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-blue-500" onchange="onCategoriaChange()">
                        <option value="" disabled selected>-- Selecione --</option>
                        <option value="Pedreiro">Pedreiro (Diária)</option>
                        <option value="Servente">Servente (Diária)</option>
                        <option value="Terceirizado">Terceirizado (Metro)</option>
                    </select>
                </div>
                
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">CPF <span class="text-red-500">*</span></label>
                        <input type="tel" id="eqp-cpf" required placeholder="000.000.000-00" inputmode="numeric" 
                           oninput="mascaraCPF(this)" 
                           class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-blue-500 text-slate-700">
                    </div>
                    <div class="w-1/2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">RG</label>
                        <input type="text" id="eqp-rg" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-blue-500 text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Telefone <span class="text-red-500">*</span></label>
                    <input type="tel" id="eqp-telefone" required placeholder="(00) 00000-0000" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-blue-500 text-slate-700 font-bold">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Endereço <span class="text-red-500">*</span></label>
                    <input type="text" id="eqp-endereco" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-blue-500 text-slate-700">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Chave PIX <span class="text-red-500">*</span></label>
                    <input type="text" id="eqp-chave_pix" required placeholder="Celular, CPF, E-mail ou Aleatória" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-blue-500 text-slate-700 font-bold">
                </div>
                
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Status <span class="text-red-500">*</span></label>
                        <select id="eqp-ativo" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-blue-500">
                            <option value="true">Ativo</option>
                            <option value="false">Inativo</option>
                        </select>
                    </div>
                    <div class="w-1/2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Data de Contrato</label>
                        <input type="date" id="eqp-data_contrato" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-blue-500 text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase" id="label-valor-base">Valor Diária (R$) <span class="text-red-500">*</span></label>
                    <input type="number" step="0.01" id="eqp-valor_diaria" required placeholder="0.00" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-blue-500 font-black text-slate-700">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Obra Alocada <span class="text-red-500">*</span></label>
                    <select id="eqp-obra_atual_id" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-blue-700 outline-none focus:border-blue-500"></select>
                </div>
                
                <button type="submit" class="w-full p-4 bg-blue-700 hover:bg-blue-800 transition-colors text-white rounded-xl font-black mt-4 shadow-lg active:scale-95 flex justify-center items-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i> Salvar
                </button>
            </form>
      </div>
    </div>

    <div id="modal-sucesso-matricula" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[110] flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-3xl p-6 w-full max-w-xs text-center shadow-2xl scale-100 transition-transform">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check-circle" class="w-8 h-8 text-green-600"></i>
            </div>
            <h3 class="text-xl font-black text-slate-800 mb-1">Cadastrado!</h3>
            <p class="text-xs text-slate-500 mb-5 font-bold truncate" id="sucesso-nome">Nome do Funcionario</p>
            
            <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 mb-6 shadow-inner">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Matrícula (Ponto)</p>
                <p class="text-5xl font-black text-blue-700" id="sucesso-num-matricula">000</p>
            </div>
            
            <button onclick="fecharModalSucesso()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-transform flex justify-center items-center gap-2">
                <i data-lucide="thumbs-up" class="w-5 h-5"></i> OK, Anotado
            </button>
        </div>
    </div>

    <script>
        // ====== CONEXÃO E ESTADO ======
        let dadosUsuario = null;
        const userSessao = localStorage.getItem('rv_user');
        if (!userSessao) window.location.replace('index.html');
        else dadosUsuario = JSON.parse(userSessao);

        const supabaseUrl = 'https://lyieiqhkspbowsrlngvn.supabase.co'; 
        const supabaseKey = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        // ADICIONADO: STATE agora inclui terceirizados
        let STATE = { obras: [], equipe: [], terceirizados: [] };

        window.onload = function() { 
            if (dadosUsuario) { showLoading(true); loadData(); }
            lucide.createIcons();          
        };

        // ====== UTILITÁRIOS ======
        function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
        function showToast(msg, isError=false) { 
            const t=document.getElementById('toast'); 
            t.textContent=msg; t.className=`fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm z-[100] transition-all text-center w-[90%] max-w-sm ${isError?'bg-red-600':'bg-slate-800'}`; 
            t.style.display='block'; setTimeout(()=>t.style.display='none',3000); 
        }

        // Normaliza CPF (remove tudo que não for dígito)
        function normalizarCPF(cpf) {
            return cpf ? cpf.replace(/\D/g, '') : '';
        }

        function openOverlayForm(id) {
            document.getElementById('overlay-forms').classList.remove('hidden');
            document.getElementById(id).classList.remove('hidden');
        }
        function closeOverlayForm(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById('overlay-forms').classList.add('hidden');
        }
        function fecharModalSucesso() {
            document.getElementById('modal-sucesso-matricula').classList.add('hidden');
        }

        // ====== DADOS ======
        async function fetchAllRecords(table) {
            let allRecords = []; let from = 0; const step = 1000; let keepFetching = true;
            while (keepFetching) {
                const { data, error } = await sb.from(table).select('*').range(from, from + step - 1);
                if (error) throw error;
                if (data && data.length > 0) { allRecords.push(...data); if (data.length < step) keepFetching = false; else from += step; } 
                else keepFetching = false;
            }
            return { data: allRecords };
        }

        async function loadData() {
            try {
                const [resObras, resEquipe, resTerceirizados] = await Promise.all([
                    fetchAllRecords('jsp_obras'),
                    fetchAllRecords('jsp_equipe'),
                    fetchAllRecords('jsp_terceirizados').catch(() => ({ data: [] }))
                ]);
                STATE.obras = resObras.data || [];
                STATE.equipe = resEquipe.data || [];
                STATE.terceirizados = resTerceirizados.data || [];

                updateSelects();
                renderEquipe();
                showLoading(false);
            } catch (err) {
                showLoading(false); showToast("Erro banco: " + err.message, true);
            }
        }

        function updateSelects() {
            const htmlObras = '<option value="">Todas Obras</option>' + STATE.obras.map(o => `<option value="${o.id}">${o.nome}</option>`).join('');
            const htmlObrasStrict = '<option value="" disabled selected>-- Selecione uma obra --</option>' + STATE.obras.map(o => `<option value="${o.id}">${o.nome}</option>`).join('');
            
            const eqpObra = document.getElementById('eqp-obra_atual_id'); 
            if(eqpObra && !eqpObra.value) eqpObra.innerHTML = htmlObrasStrict;

            const eqpFilterObra = document.getElementById('eqp-filter-obra');
            if(eqpFilterObra) { const cVal = eqpFilterObra.value; eqpFilterObra.innerHTML = htmlObras; if(cVal) eqpFilterObra.value = cVal; }
        }

        // ====== NOVA FUNÇÃO: Unifica equipe própria e terceirizados para exibição ======
        function getColaboradoresUnificados() {
            const equipe = STATE.equipe.map(e => ({
                ...e,
                tipo: 'diaria',
                valor_base: parseFloat(e.valor_diaria || 0),
                table_origin: 'equipe'
            }));

            const terceirizados = STATE.terceirizados.map(t => ({
                ...t,
                nome: t.nome,
                categoria: 'Terceirizado (Metro)',
                telefone: t.telefone,
                cpf: t.cpf_cnpj,
                rg: t.rg,
                endereco: t.endereco,
                chave_pix: t.chave_pix,
                obra_atual_id: t.obra_atual_id,
                ativo: t.ativo,
                tipo: 'metro',
                valor_base: parseFloat(t.valor_metro || 0),
                table_origin: 'terceirizados'
            }));

            return [...equipe, ...terceirizados];
        }

        // ====== RENDER EQUIPE UNIFICADA ======
        function renderEquipe() {
            const term = document.getElementById('eqp-search').value.toLowerCase();
            const filterObra = document.getElementById('eqp-filter-obra').value;
            const filterStatus = document.getElementById('eqp-filter-status').value;
            const filterTipo = document.getElementById('eqp-filter-tipo').value;
            
            const colaboradores = getColaboradoresUnificados();
            
            let fil = colaboradores.filter(c => 
                (c.nome || '').toLowerCase().includes(term) || 
                (c.categoria || '').toLowerCase().includes(term)
            );

            if(filterObra) {
                fil = fil.filter(c => String(c.obra_atual_id) === String(filterObra));
            }
            if(filterStatus) {
                const isAtivoStatus = filterStatus === 'true';
                fil = fil.filter(c => (c.ativo === true || c.ativo === 'true') === isAtivoStatus);
            }
            if(filterTipo !== 'todos') {
                fil = fil.filter(c => c.tipo === filterTipo);
            }

            fil.sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));
            
            document.getElementById('equipe-list').innerHTML = fil.map(c => {
                const obra = STATE.obras.find(x => x.id == c.obra_atual_id);
                const nomeObra = obra ? obra.nome : 'Sem obra alocada';
                const isAtivo = c.ativo === true || c.ativo === 'true';
                
                const tipoBadge = c.tipo === 'diaria' 
                    ? '<span class="bg-blue-100 text-blue-700 text-[8px] font-bold px-1.5 py-0.5 rounded ml-1">DIÁRIA</span>'
                    : '<span class="bg-purple-100 text-purple-700 text-[8px] font-bold px-1.5 py-0.5 rounded ml-1">METRO</span>';
                
                const valorExibicao = c.tipo === 'diaria' 
                    ? `Diária: ${parseFloat(c.valor_base).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}`
                    : `Metro: ${parseFloat(c.valor_base).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}/m`;

                let zapBtn = '';
                if(c.telefone) {
                    const numZap = c.telefone.replace(/\D/g, ''); 
                    if(numZap.length >= 10) { 
                        zapBtn = `<a href="https://wa.me/55${numZap}" target="_blank" class="p-2 bg-green-100 text-green-600 hover:bg-green-200 rounded-lg shrink-0 flex items-center justify-center transition-colors shadow-sm"><i data-lucide="message-circle" class="w-4 h-4"></i></a>`;
                    }
                }

                let botoesAcao = '';
                if (c.tipo === 'diaria') {
                    botoesAcao = `<button onclick="openEquipeForm('${c.id}')" class="p-2 bg-slate-100 hover:bg-slate-200 text-blue-700 rounded-lg shrink-0 flex items-center justify-center transition-colors shadow-sm"><i data-lucide="edit-3" class="w-4 h-4"></i></button>`;
                } else {
                    botoesAcao = `<button onclick="openEquipeForm('${c.id}', 'terceirizado')" class="p-2 bg-slate-100 hover:bg-slate-200 text-blue-700 rounded-lg shrink-0 flex items-center justify-center transition-colors shadow-sm"><i data-lucide="edit-3" class="w-4 h-4"></i></button>`;
                }

                return `
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative">
                    <div class="absolute top-3 right-3 flex gap-1.5 items-center">
                        ${c.tipo === 'diaria' ? `<span class="bg-slate-100 text-slate-500 border border-slate-200 text-[9px] font-black px-2 py-1 rounded-md">Mat: ${c.matricula || '-'}</span>` : ''}
                        <span class="${isAtivo ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} text-[9px] font-black px-2 py-1 rounded-md tracking-wider">${isAtivo ? 'ATIVO' : 'INATIVO'}</span>
                    </div>
                    
                    <div class="flex justify-between items-start mb-2 pr-28">
                        <div>
                            <h4 class="font-black text-slate-800 text-sm leading-tight flex items-center">
                                ${c.nome || '-'} ${tipoBadge}
                            </h4>
                            <p class="text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-wider">${c.categoria || '-'} ${c.telefone ? ` | ${c.telefone}` : ''}</p>
                            <p class="text-xs text-blue-700 font-bold mt-1.5 flex items-center gap-1 bg-blue-50 w-max px-2 py-1 rounded-md"><i data-lucide="building" class="w-3 h-3"></i> ${nomeObra}</p>
                            <p class="text-[10px] text-slate-600 font-bold mt-1">${valorExibicao}</p>
                        </div>
                    </div>
                    
                    <div class="flex justify-end gap-2 mt-3 pt-3 border-t border-slate-100">
                        ${zapBtn}
                        ${botoesAcao}
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // ====== NOVA FUNÇÃO: Altera label do campo valor conforme categoria ======
        function onCategoriaChange() {
            const cat = document.getElementById('eqp-categoria').value;
            const label = document.getElementById('label-valor-base');
            const tipoOrigem = document.getElementById('eqp-tipo-origem');
            
            if (cat === 'Terceirizado') {
                label.innerText = 'Valor do Metro (R$) *';
                tipoOrigem.value = 'terceirizado';
            } else {
                label.innerText = 'Valor Diária (R$) *';
                tipoOrigem.value = 'equipe';
            }
        }

        // ====== ABRIR FORMULÁRIO UNIFICADO ======
        function openEquipeForm(id, tipoOrigem = 'equipe') {
            const catSelect = document.getElementById('eqp-categoria');
            const tipoHidden = document.getElementById('eqp-tipo-origem');
            
            if (id) {
                if (tipoOrigem === 'terceirizado') {
                    const t = STATE.terceirizados.find(x => x.id == id);
                    if (t) {
                        document.getElementById('eqp-id').value = t.id;
                        document.getElementById('eqp-nome').value = t.nome || '';
                        catSelect.value = 'Terceirizado';
                        document.getElementById('eqp-telefone').value = t.telefone || '';
                        document.getElementById('eqp-cpf').value = formatarCPF(t.cpf_cnpj || '');
                        document.getElementById('eqp-rg').value = t.rg || '';
                        document.getElementById('eqp-endereco').value = t.endereco || '';
                        document.getElementById('eqp-chave_pix').value = t.chave_pix || '';
                        document.getElementById('eqp-obra_atual_id').value = t.obra_atual_id || '';
                        document.getElementById('eqp-data_contrato').value = '';
                        document.getElementById('eqp-valor_diaria').value = t.valor_metro || '';
                        document.getElementById('eqp-ativo').value = (t.ativo === true || t.ativo === 'true') ? 'true' : 'false';
                        tipoHidden.value = 'terceirizado';
                        onCategoriaChange();
                    }
                } else {
                    const e = STATE.equipe.find(x => x.id == id);
                    if (e) {
                        document.getElementById('eqp-id').value = e.id;
                        document.getElementById('eqp-nome').value = e.nome || '';
                        catSelect.value = e.categoria || 'Servente';
                        document.getElementById('eqp-cpf').value = formatarCPF(e.cpf || '');
                        document.getElementById('eqp-rg').value = e.rg || '';
                        document.getElementById('eqp-telefone').value = e.telefone || '';
                        document.getElementById('eqp-endereco').value = e.endereco || '';
                        document.getElementById('eqp-chave_pix').value = e.chave_pix || '';
                        document.getElementById('eqp-valor_diaria').value = e.valor_diaria || '';
                        document.getElementById('eqp-obra_atual_id').value = e.obra_atual_id || '';
                        document.getElementById('eqp-data_contrato').value = e.data_contrato || '';
                        document.getElementById('eqp-ativo').value = (e.ativo === true || e.ativo === 'true') ? 'true' : 'false';
                        tipoHidden.value = 'equipe';
                        onCategoriaChange();
                    }
                }
            } else {
                document.getElementById('equipe-form-container').querySelector('form').reset();
                document.getElementById('eqp-id').value = '';
                catSelect.value = 'Servente';
                document.getElementById('eqp-ativo').value = 'true';
                tipoHidden.value = 'equipe';
                onCategoriaChange();
            }
            openOverlayForm('equipe-form-container');
        }

        function gerarIdSeguro() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // ====== SALVAR UNIFICADO ======
        async function saveEquipe(e) {
            e.preventDefault(); 
            showLoading(true);
            
            const getV = (id) => {
                const el = document.getElementById(id);
                return el ? el.value.trim() : '';
            };

            const idAtual = getV('eqp-id');
            const isNew = !idAtual;
            const tipoOrigem = document.getElementById('eqp-tipo-origem').value;
            
            const nome = getV('eqp-nome');
            const categoria = getV('eqp-categoria');
            const telefone = getV('eqp-telefone');
            const cpf = getV('eqp-cpf');
            const rg = getV('eqp-rg');
            const endereco = getV('eqp-endereco');
            const chave_pix = getV('eqp-chave_pix');
            const obra_id = getV('eqp-obra_atual_id') || null;
            const valor_base = parseFloat(getV('eqp-valor_diaria')) || 0;
            const data_contrato = getV('eqp-data_contrato') || null;
            const ativo = getV('eqp-ativo') === 'true';

            // Validações básicas
            if (!nome) { showLoading(false); showToast("Nome obrigatório.", true); return; }
            if (!cpf) { showLoading(false); showToast("CPF obrigatório.", true); return; }
            if (!telefone) { showLoading(false); showToast("Telefone obrigatório.", true); return; }
            if (!obra_id) { showLoading(false); showToast("Selecione a obra.", true); return; }
            if (valor_base <= 0) { showLoading(false); showToast("Valor inválido.", true); return; }

            const cpfNumerico = cpf.replace(/\D/g, '');
            if (cpfNumerico.length !== 11) {
                showLoading(false);
                showToast('CPF deve conter 11 dígitos numéricos', true);
                return;
            }

            // Verifica duplicidade de CPF (apenas para equipe própria)
            if (tipoOrigem === 'equipe') {
                try {
                    let query = sb.from('jsp_equipe').select('id').eq('cpf', cpfNumerico);
                    if (!isNew) query = query.neq('id', idAtual);
                    const { data: duplicado, error: errDuplicado } = await query.maybeSingle();
                    if (errDuplicado) {
                        showLoading(false);
                        showToast('Erro ao verificar CPF: ' + errDuplicado.message, true);
                        return;
                    }
                    if (duplicado) {
                        showLoading(false);
                        showToast('Este CPF já está cadastrado no sistema.', true);
                        return;
                    }
                } catch (ex) {
                    showLoading(false);
                    showToast('Erro na verificação de duplicidade', true);
                    return;
                }
            }

            if (tipoOrigem === 'terceirizado') {
                const payload = {
                    nome,
                    cpf_cnpj: cpf,
                    rg,
                    telefone,
                    chave_pix,
                    endereco,
                    obra_atual_id: obra_id,
                    valor_metro: valor_base,
                    ativo
                };
                
                if (!isNew) {
                    payload.id = idAtual;
                } else {
                    payload.id = gerarIdSeguro();
                }
                
                const { error } = await sb.from('jsp_terceirizados').upsert(payload);
                if (error) {
                    showLoading(false);
                    return showToast("Erro ao salvar terceirizado: " + error.message, true);
                }
                
                closeOverlayForm('equipe-form-container');
                showToast("Terceirizado salvo com sucesso!");
                await loadData();
            } else {
                const payload = {
                    nome,
                    categoria,
                    telefone,
                    cpf: cpfNumerico,
                    rg,
                    endereco,
                    chave_pix,
                    obra_atual_id: obra_id,
                    valor_diaria: valor_base,
                    data_contrato,
                    ativo
                };
                
                if (!isNew) {
                    payload.id = idAtual;
                } else {
                    payload.id = gerarIdSeguro();
                    
                    let maxMat = 0;
                    if (STATE.equipe && STATE.equipe.length > 0) {
                        STATE.equipe.forEach(item => {
                            let m = parseInt(item.matricula);
                            if (!isNaN(m) && m > maxMat) maxMat = m;
                        });
                    }
                    payload.matricula = maxMat > 0 ? maxMat + 1 : 133;
                    payload.contrato_assinado = false;
                }
                
                const { error } = await sb.from('jsp_equipe').upsert(payload);
                if (error) {
                    showLoading(false);
                    return showToast("Erro ao salvar membro da equipe: " + error.message, true);
                }
                
                closeOverlayForm('equipe-form-container');
                
                if (isNew) {
                    const nomeEl = document.getElementById('sucesso-nome');
                    const matEl = document.getElementById('sucesso-num-matricula');
                    const modalSucesso = document.getElementById('modal-sucesso-matricula');
                    
                    if(nomeEl) nomeEl.innerText = payload.nome;
                    if(matEl) matEl.innerText = payload.matricula;
                    if(modalSucesso) modalSucesso.classList.remove('hidden');
                    lucide.createIcons();
                } else {
                    showToast("Funcionário atualizado com sucesso!");
                }
                
                await loadData();
            }
        }

        function mascaraCPF(input) {
            let valor = input.value.replace(/\D/g, '');
            if (valor.length > 11) valor = valor.slice(0, 11);
            if (valor.length > 9) {
                valor = valor.replace(/^(\d{3})(\d{3})(\d{3})(\d{2})$/, '$1.$2.$3-$4');
            } else if (valor.length > 6) {
                valor = valor.replace(/^(\d{3})(\d{3})(\d{0,3})$/, '$1.$2.$3');
            } else if (valor.length > 3) {
                valor = valor.replace(/^(\d{3})(\d{0,3})$/, '$1.$2');
            }
            input.value = valor;
        }

        function formatarCPF(valor) {
            if (!valor) return '';
            const nums = valor.replace(/\D/g, '');
            if (nums.length !== 11) return valor;
            return nums.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        }

        function fazerLogout() { localStorage.removeItem('rv_user'); window.location.replace('index.html'); }
    </script>
